<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Tes Kecermatan Otomatis</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f6f7;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
        }

        header {
            background: linear-gradient(135deg, var(--primary), #34495e);
            color: white;
            text-align: center;
            padding: 40px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 2.3rem; }
        header p { margin: 10px 0 0 0; opacity: 0.9; font-size: 1.1rem; }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .quiz-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .quiz-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .quiz-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .quiz-body {
            padding: 20px;
            flex-grow: 1;
        }

        .quiz-badge {
            display: inline-block;
            background-color: #e8f4f8;
            color: var(--accent);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .quiz-title {
            margin: 0 0 10px 0;
            font-size: 1.3rem;
            color: var(--primary);
            text-transform: capitalize;
        }

        .quiz-footer { padding: 0 20px 20px 20px; }

        .btn-play {
            display: block;
            text-align: center;
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            transition: background 0.2s;
        }

        .btn-play:hover { background-color: var(--accent); }

        /* Loading & Error Style */
        .status-msg {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            padding: 40px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <header>
        <h1>Portal Tes & Latihan Kecermatan</h1>
        <p>Daftar modul kuis ini diperbarui secara otomatis dari repositori GitHub.</p>
    </header>

    <div class="container">
        <div class="quiz-grid" id="quiz-container">
            <div class="status-msg" id="status-text">Memuat daftar kuis dari GitHub...</div>
        </div>
    </div>

    <script>
        // Konfigurasi Repositori Anda
        const username = "MecaNerdika";
        const repo = "testerEP";
        const apiUrl = `https://api.github.io/repos/${username}/${repo}/contents/`;

        async function fetchQuizzes() {
            const container = document.getElementById('quiz-container');
            const statusText = document.getElementById('status-text');

            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error("Gagal mengambil data dari repositori.");
                
                const files = await response.json();
                
                // Saring hanya file .html dan abaikan index.html
                const htmlFiles = files.filter(file => 
                    file.name.endsWith('.html') && 
                    file.name.toLowerCase() !== 'index.html'
                );

                if (htmlFiles.length === 0) {
                    statusText.innerText = "Tidak ada file kuis (.html) ditemukan di repositori ini.";
                    return;
                }

                // Bersihkan pesan loading
                container.innerHTML = "";

                // Generate Card secara otomatis
                htmlFiles.forEach(file => {
                    // Membuat nama kuis yang rapi dari nama file (contoh: "kecermatanhuruf.html" -> "Kecermatan Huruf")
                    let cleanTitle = file.name
                        .replace('.html', '')
                        .replace(/[-_]/g, ' ')
                        .replace(/([A-Z])/g, ' $1') // Beri spasi jika ada CamelCase
                        .trim();

                    let card = document.createElement('div');
                    card.className = 'quiz-card';
                    card.innerHTML = `
                        <div class="quiz-body">
                            <span class="quiz-badge">Modul Tes</span>
                            <h2 class="quiz-title">${cleanTitle}</h2>
                            <p style="font-size: 0.9rem; color: #7f8c8d;">File: ${file.name}</p>
                        </div>
                        <div class="quiz-footer">
                            <a href="${file.name}" class="btn-play">Mulai Tes</a>
                        </div>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                console.error(error);
                statusText.innerText = "Gagal memuat kuis secara otomatis. Pastikan pengaturan GitHub Pages Anda aktif.";
                statusText.style.color = "var(--accent)";
            }
        }

        // Jalankan fungsi saat halaman dimuat
        window.onload = fetchQuizzes;
    </script>

</body>
</html>
