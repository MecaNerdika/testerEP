<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penalaran Analitis</title>
    <style>
      :root {
        --bg: #060000; /* slate-900 */
        --card: #111827; /* gray-900 */
        --muted: #334155; /* slate-600 */
        --text: #ffffff; /* gray-200 */
        --accent: #38bdf8; /* sky-400 */
        --accent-2: #22c55e; /* green-500 */
        --danger: #ef4444; /* red-500 */
        --warn: #f59e0b; /* amber-500 */
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        background:
          radial-gradient(1200px 800px at 10% -10%, #1e293b, transparent),
          radial-gradient(800px 600px at 120% 0%, #0b3b47, transparent),
          var(--bg);
        color: var(--text);
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .app {
        width: 100%;
        max-width: 980px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: 0.5px;
        font-size: clamp(18px, 3.5vw, 24px);
      }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        padding: 10px 14px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #1f2a44;
        box-shadow: var(--shadow);
      }
      .card {
        background: linear-gradient(180deg, #0b1220, #0a1020);
        border: 1px solid #1f2a44;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .section {
        display: none;
      }
      .active {
        display: block;
      }
      .card-inner {
        padding: 20px;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }
      .grid-responsive {
        grid-template-columns: 1fr;
      }
      @media (min-width: 720px) {
        .grid-responsive {
          grid-template-columns: 1fr 320px;
        }
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #26314d;
        background: #0b1220;
        color: var(--text);
        outline: none;
        box-shadow: inset 0 0 0 9999px rgba(255, 255, 255, 0);
      }
      label {
        font-size: 14px;
        color: #cbd5e1;
      }
      .btn {
        cursor: pointer;
        padding: 12px 16px;
        border-radius: 14px;
        background: var(--accent);
        color: #001219;
        border: none;
        font-weight: 700;
        box-shadow: var(--shadow);
        transition: 0.2s transform ease;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn.secondary {
        background: #1f2937;
        color: #e2e8f0;
        border: 1px solid #334155;
      }
      .btn.warn {
        background: var(--warn);
        color: #0b1220;
      }
      .btn.danger {
        background: var(--danger);
        color: #0b1220;
      }
      .muted {
        color: #94a3b8;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #223156;
        font-size: 12px;
        color: #cbd5e1;
      }

      .question-area {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .q-title {
        font-weight: 400;
        font-size: 15px;
      }
      .choices {
        display: grid;
        gap: 10px;
      }
      .choice {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        border: 1px solid #1f2a44;
        background: #0b1220;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
      }
      .choice input {
        margin-top: 4px;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        max-height: 240px;
        overflow: auto;
        padding: 10px;
      }
      .nav button {
        width: 44px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid #1f2a44;
        background: #0b1220;
        color: #cbd5e1;
        font-weight: 700;
        cursor: pointer;
      }
      .nav button.active {
        outline: 2px solid var(--accent);
        color: #0ea5e9;
      }
      .nav button.done {
        background: #07291f;
        border-color: #0b7a53;
        color: #34d399;
      }

      .footer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 10px;
      }

      .legend {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .results {
        display: grid;
        gap: 12px;
      }
      .score-box {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .score-card {
        background: #0b1220;
        border: 1px solid #1f2a44;
        border-radius: 14px;
        padding: 14px;
      }

      .info-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">Penalaran Analitis</div>
        <div class="pill" id="infoUser">Belum login</div>
        <div class="timer" id="timer">--:--</div>
      </header>

      <!-- SECTION 1: FORM MINIMAL -->
      <section id="section-form" class="section active">
        <div class="card">
          <div class="card-inner grid">
            <div>
              <h2 style="margin: 0 0 10px 0">Masuk Kuis</h2>
              <p class="muted" style="margin-top: 0">
                Masukkan nama dan password untuk memulai. Tidak ada pengaturan
                tambahan.
              </p>
              <div class="grid">
                <div>
                  <label for="nama">Nama</label>
                  <input id="nama" type="text" placeholder="Nama peserta" />
                </div>
                <div>
                  <label for="pass">Password</label>
                  <input id="pass" type="password" placeholder="Password" />
                </div>
                <button class="btn" id="btnMulai">Mulai Kuis</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 2: QUIZ -->
      <section id="section-quiz" class="section">
        <div class="grid grid-responsive">
          <div class="card">
            <div class="card-inner">
              <div class="info-row">
                <div class="pill" id="infoKategori">Kategori: -</div>
                <div class="pill" id="infoSoal">Soal 0 / 180</div>
              </div>
              <div class="question-area" id="questionArea">
                <!-- Question inject here -->
              </div>
              <div class="footer-actions">
                <button class="btn secondary" id="prevBtn">Prev</button>
                <div class="legend">
                  <span class="pill">• Biru = aktif</span>
                  <span
                    class="pill"
                    style="
                      background: #07291f;
                      color: #34d399;
                      border-color: #0b7a53;
                    "
                    >• Hijau = terjawab</span
                  >
                </div>
                <button class="btn" id="nextBtn">Next</button>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <h3 style="margin-top: 0">Navigasi Soal</h3>
              <div class="nav" id="nav">
                <!-- Nav buttons injected here -->
              </div>
              <div class="grid" style="margin-top: 8px">
                <button class="btn warn" id="btnSubmit">
                  Kumpulkan Jawaban
                </button>
                <button class="btn danger" id="btnReset">Reset Jawaban</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 3: HASIL -->
      <section id="section-result" class="section">
        <div class="card">
          <div class="card-inner results">
            <h2 style="margin: 0">Hasil Ujian</h2>
            <p class="muted" id="resultUser">Peserta: -</p>
            <div class="score-box">
              <div class="score-card" style="grid-column: span 2">
                <div class="muted">Total Skor</div>
                <div id="scoreTotal" style="font-size: 30px; font-weight: 900">
                  0 / 180
                </div>
              </div>
            </div>
            <div>
              <button class="btn" id="btnUlang">Mulai Lagi</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      /** UTIL **/
      const el = (sel) => document.querySelector(sel);
      const els = (sel) => Array.from(document.querySelectorAll(sel));
      const shuffle = (arr) =>
        arr
          .map((v) => [Math.random(), v])
          .sort((a, b) => a[0] - b[0])
          .map((x) => x[1]);

      /** BANK SOAL (40/40/40) **/
      // Format: {type:'sinonim'|'antonim'|'hiponim', q:'', options:['','','',''], answer: index}

      const SOAL_fungsi = [
        {
          q: " Dalam sebuah balap lari, Budi mencapai garis finis lebih dulu daripada Candra, tetapi setelah Andi. Dedi finis setelah Candra. Siapakah yang memenangkan balapan tersebut?",
          o: ["Andi", "Budi", "Candra", "Dedi", "Tidak dapat ditentukan"],
          a: 0,
        },
        {
          q: " Harga sepatu merk P lebih mahal daripada merk Q dan lebih murah dari merk R. Sepatu merk S sama harganya dengan merk P dan lebih mahal dari merk Q. Sepatu manakah yang paling mahal?",
          o: ["Merk P", "Merk Q", "Merk R", "Merk S", "Merk P dan S"],
          a: 2,
        },
        {
          q: " Nilai ujian Matematika Fina lebih tinggi dari Gilang dan lebih rendah dari Hana. Nilai ujian Intan lebih rendah dari Fina, tetapi lebih tinggi dari Gilang. Siapakah yang memiliki nilai paling rendah?",
          o: ["Fina", "Gilang", "Hana", "Intan", "Hana dan Intan"],
          a: 1,
        },
        {
          q: " Jarak rumah Mita ke sekolah lebih jauh daripada jarak rumah Nina ke sekolah. Jarak rumah Ocha ke sekolah lebih dekat daripada rumah Nina. Siapakah yang rumahnya paling dekat dengan sekolah?",
          o: ["Mita", "Nina", "Ocha", "Mita dan Nina", "Tidak dapat diketahui"],
          a: 2,
        },
        {
          q: " Lima orang anak mengantre tiket bioskop. K berada di depan L, tetapi di belakang M. N berada di depan M. O berada tepat di belakang L. Urutan antrean dari yang paling depan ke belakang adalah...",
          o: [
            "N, M, K, L, O",
            "M, N, K, L, O",
            "N, K, M, L, O",
            "M, K, N, O, L",
            "N, M, K, O, L",
          ],
          a: 0,
        },
        {
          q: " Terdapat lima lantai di sebuah gedung perkantoran. Perusahaan A berada di lantai tepat di bawah perusahaan B. Perusahaan C berada di lantai paling atas. Perusahaan D berada di bawah perusahaan A dan di atas perusahaan E. Perusahaan apakah yang berada di lantai 2?",
          o: [
            "Perusahaan A",
            "Perusahaan B",
            "Perusahaan C",
            "Perusahaan D",
            "Perusahaan E",
          ],
          a: 3,
        },
        {
          q: " Sebuah tim cerdas cermat terdiri dari 3 orang yang dipilih dari 5 kandidat: P, Q, R, S, dan T. Syaratnya:<br>- Jika P dipilih, maka Q tidak boleh dipilih.<br>- R dan S harus selalu dipilih bersama-sama.<br>- T tidak bisa satu tim dengan S.<br>Jika P terpilih, siapa anggota tim lainnya?",
          o: ["Q dan R", "R dan S", "S dan T", "R dan T", "Q dan T"],
          a: 1,
        },
        {
          q: " Enam orang (U, V, W, X, Y, Z) duduk mengelilingi meja bundar. U duduk berhadapan dengan V. W duduk di sebelah kanan U. X duduk berhadapan dengan W. Z duduk di antara V dan X. Siapakah yang duduk di sebelah kiri U?",
          o: ["V", "X", "Y", "Z", "W"],
          a: 2,
        },
        {
          q: " Jadwal piket lima siswa (Agus, Budi, Citra, Dian, Eka) diatur dari Senin hingga Jumat. Budi piket di hari sebelum Dian, tetapi sesudah Agus. Citra tidak piket di hari Senin maupun Jumat. Eka piket pada hari Kamis. Siapa yang piket pada hari Selasa?",
          o: ["Agus", "Budi", "Citra", "Dian", "Eka"],
          a: 2,
        },
        {
          q: " Dalam pemilihan ketua kelas, suara untuk Rio lebih banyak dari suara untuk Tio. Suara untuk Tio lebih sedikit dari suara untuk Vio. Suara untuk Wio lebih banyak dari suara untuk Rio, tetapi lebih sedikit dari suara untuk Vio. Siapa yang mendapatkan suara terbanyak?",
          o: ["Rio", "Tio", "Vio", "Wio", "Rio dan Vio"],
          a: 2,
        },
        {
          q: " Lima mobil balap (Merah, Biru, Hijau, Kuning, Hitam) sedang berpacu. Mobil Merah berada di depan Biru tetapi di belakang Hijau. Mobil Hitam berada di depan Kuning tetapi di belakang Biru. Mobil mana yang berada di urutan ke-4?",
          o: ["Merah", "Biru", "Hijau", "Kuning", "Hitam"],
          a: 4,
        },
        {
          q: " Gaji karyawan A lebih besar dari karyawan B, tapi lebih kecil dari karyawan C. Karyawan D gajinya sama dengan karyawan A. Karyawan E gajinya lebih kecil dari karyawan B. Karyawan mana yang memiliki gaji terendah kedua?",
          o: ["A", "B", "C", "D", "E"],
          a: 1,
        },
        {
          q: " Sebuah menu makan malam memiliki aturan: Jika ada ayam, tidak boleh ada ikan. Jika ada daging sapi, harus ada kentang. Jika ada ikan, harus ada nasi. Budi memesan makan malam dengan daging sapi dan ikan. Apa yang juga HARUS ada dalam pesanannya?",
          o: [
            "Ayam dan kentang",
            "Ayam dan nasi",
            "Kentang dan nasi",
            "Hanya kentang",
            "Hanya nasi",
          ],
          a: 2,
        },
        {
          q: " Enam buku diletakkan berjajar di rak. Buku Sejarah berada di antara Fisika dan Kimia. Buku Biologi berada di ujung kanan. Buku Matematika berada di sebelah kiri Fisika. Buku Bahasa berada di sebelah kiri Matematika. Buku apa yang berada di urutan ketiga dari kiri?",
          o: ["Fisika", "Sejarah", "Kimia", "Matematika", "Bahasa"],
          a: 0,
        },
        {
          q: " Tingkat kejujuran P lebih baik dari Q. R kadang berbohong, tapi ia lebih jujur dari S. T lebih suka berbohong dibanding U. Q cukup jujur, tapi P tetap lebih jujur dari R. Jika U sama jujurnya dengan Q, siapa yang paling suka berbohong di antara P, Q, R, S, T, dan U? (Asumsikan P,Q,R,U di atas rata-rata)",
          o: ["Q", "R", "S", "T", "Tidak dapat dipastikan antara S dan T"],
          a: 4,
        },
        {
          q: " Tiga pasangan suami istri (A&B, C&D, E&F) makan bersama di meja bundar berisi 6 kursi. Pria dan wanita harus duduk berselang-seling. Tidak ada pasangan suami istri yang duduk bersebelahan. Jika A (pria) duduk di sebelah F (wanita) dan di sebelah D (wanita), siapakah yang duduk tepat di seberang A?",
          o: ["B", "C", "E", "F", "D"],
          a: 0,
        },
        {
          q: " Sebuah password terdiri dari 4 angka berbeda. Angka pertama ganjil dan lebih besar dari angka terakhir. Angka kedua adalah hasil bagi angka keempat dengan angka ketiga. Angka ketiga adalah bilangan prima genap. Berapakah password tersebut?",
          o: ["9128", "7224", "9428", "7326", "5224"],
          a: 2,
        },
        {
          q: " Berdasarkan tes psikologi, H lebih teliti dari I dan J, tapi kurang teliti dari K. L sama telitinya dengan I. M lebih teliti dari K. Siapakah yang paling tidak teliti?",
          o: [
            "I",
            "J",
            "L",
            "I dan L",
            "Tidak bisa dipastikan antara I, J, dan L",
          ],
          a: 4,
        },
        {
          q: " Empat orang (A, B, C, D) memakai kemeja dengan warna berbeda (Merah, Biru, Hijau, Kuning). A tidak memakai Merah atau Biru. B tidak memakai Biru atau Hijau. C hanya mau memakai Merah. Warna kemeja apa yang dipakai D?",
          o: ["Merah", "Biru", "Hijau", "Kuning", "Tidak dapat ditentukan"],
          a: 1,
        },
        {
          q: " Detektif menyelidiki 3 tersangka (X, Y, Z). X berkata: 'Y pelakunya'. Y berkata: 'Z pelakunya'. Z berkata: 'Y berbohong'. Jika hanya SATU orang yang berkata jujur, siapakah pelakunya?",
          o: ["X", "Y", "Z", "X dan Y", "Tidak ada pelaku"],
          a: 2,
        },
      ].map((x) => ({
        type: "Penalaran",
        q: x.q,
        options: x.o,
        answer: x.a,
      }));

      S_fungsi = shuffle(SOAL_fungsi);

      /*  Validasi jumlah
                                  if(SINONIM.length!==90||ANTONIM.length!==90){
                                    console.warn('Jumlah soal tidak 90/90:', SINONIM.length, ANTONIM.length);
                                  }  */

      // /* Gabung & acak
      function shuffleOptions(q) {
        let opts = q.options.map((opt, i) => ({ opt, i }));
        opts = shuffle(opts); // pake fungsi shuffle yang sudah kamu punya
        let newAnswer = opts.findIndex((o) => o.i === q.answer);
        return {
          ...q,
          options: opts.map((o) => o.opt),
          answer: newAnswer,
        };
      }
      //*/
      let QUESTIONS = [...S_fungsi].map((q, i) => ({
        id: i + 1,
        ...shuffleOptions(q),
      }));
      // let QUESTIONS = [...SINONIM, ...ANTONIM].map((q,i)=>({id:i+1, ...q }));
      // State
      let state = {
        user: null,
        timeLeft: 30 * 60, // 25 menit
        currentIndex: 0,
        answers: Array(180).fill(null), // simpan index jawaban (0..3) atau null
      };

      /** RENDERING **/
      function formatTime(s) {
        const m = Math.floor(s / 60)
          .toString()
          .padStart(2, "0");
        const r = (s % 60).toString().padStart(2, "0");
        return `${m}:${r}`;
      }

      function renderTimer() {
        el("#timer").textContent = formatTime(state.timeLeft);
        if (state.timeLeft <= 60) {
          el("#timer").style.background = "#331a1a";
          el("#timer").style.borderColor = "#7f1d1d";
        }
        if (state.timeLeft <= 0) {
          submitQuiz();
        }
      }

      let tick = null;
      function startTimer() {
        if (tick) clearInterval(tick);
        const waktuTarget = Date.now() + state.timeLeft * 1000;
        tick = setInterval(() => {
          const waktuSekarang = Date.now();

          state.timeLeft = Math.ceil((waktuTarget - waktuSekarang) / 1000);

          if (state.timeLeft > 0) {
            renderTimer();
          } else {
            state.timeLeft = 0;
            renderTimer();
            clearInterval(tick);
          }
        }, 200);
      }

      function mountNav() {
        const nav = el("#nav");
        nav.innerHTML = "";
        QUESTIONS.forEach((q, idx) => {
          const b = document.createElement("button");
          b.textContent = idx + 1;
          b.addEventListener("click", () => {
            goTo(idx);
          });
          nav.appendChild(b);
        });
        updateNavActive();
      }

      function updateNavActive() {
        const buttons = els("#nav button");
        buttons.forEach((b, idx) => {
          b.classList.toggle("active", idx === state.currentIndex);
          b.classList.toggle("done", state.answers[idx] !== null);
        });
        el("#infoSoal").textContent = `Soal ${state.currentIndex + 1} / ${
          QUESTIONS.length
        }`;
        el("#infoKategori").textContent = `Kategori: ${QUESTIONS[
          state.currentIndex
        ].type.toUpperCase()}`;
      }

      function renderQuestion() {
        const q = QUESTIONS[state.currentIndex];
        const container = el("#questionArea");
        container.innerHTML = "";
        const title = document.createElement("div");
        title.className = "q-title";

        title.innerHTML = q.q;
        container.appendChild(title);

        const list = document.createElement("div");
        list.className = "choices";
        q.options.forEach((opt, i) => {
          const row = document.createElement("label");
          row.className = "choice";
          const input = document.createElement("input");
          input.type = "radio";
          input.name = "choice";
          input.value = i;
          input.checked = state.answers[state.currentIndex] === i;
          input.addEventListener("change", () => {
            state.answers[state.currentIndex] = i;
            updateNavActive();
          });
          const span = document.createElement("div");
          span.innerHTML = opt;
          row.appendChild(input);
          row.appendChild(span);
          list.appendChild(row);
        });
        container.appendChild(list);
        MathJax.typeset();
      }

      function goTo(idx) {
        state.currentIndex = Math.max(0, Math.min(QUESTIONS.length - 1, idx));
        updateNavActive();
        renderQuestion();
      }

      function next() {
        if (state.currentIndex < QUESTIONS.length - 1) {
          goTo(state.currentIndex + 1);
        }
      }
      function prev() {
        if (state.currentIndex > 0) {
          goTo(state.currentIndex - 1);
        }
      }

      function resetAnswers() {
        if (!confirm("Yakin reset semua jawaban?")) return;
        state.answers = Array(QUESTIONS.length).fill(null);
        updateNavActive();
        renderQuestion();
      }

      function submitQuiz() {
        // hitung skor per kategori
        let sSin = 0,
          sAnt = 0,
          sHip = 0;
        QUESTIONS.forEach((q, idx) => {
          const pick = state.answers[idx];
          const correct = q.answer;
          if (pick === correct) {
            if (q.type === "Penalaran") sSin++;
          }
        });
        const total = sSin + sAnt + sHip;

        // tampilkan
        let total_question = QUESTIONS.length;

        el("#scoreTotal").textContent = `${total} / ${total_question}`;
        el("#resultUser").textContent = `Peserta: ${
          state.user?.nama || "-"
        } (waktu habis/kumpul)`;

        // stop timer, ganti section
        if (tick) clearInterval(tick);
        showSection("result");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showSection(which) {
        el("#section-form").classList.remove("active");
        el("#section-quiz").classList.remove("active");
        el("#section-result").classList.remove("active");
        if (which === "form") el("#section-form").classList.add("active");
        if (which === "quiz") el("#section-quiz").classList.add("active");
        if (which === "result") el("#section-result").classList.add("active");
      }

      // EVENTS
      el("#btnMulai").addEventListener("click", () => {
        const nama = el("#nama").value.trim();
        const pass = el("#pass").value.trim();
        if (!nama || !pass) {
          alert("Nama dan password wajib diisi.");
          return;
        }
        if (pass !== "GLOCK17") {
          alert(
            "password salah! tanya password ke sir hardi. klo sir hardi dak tau tanya ke sir meca",
          );
          return;
        }
        state.user = { nama, pass };
        el("#infoUser").textContent = `Peserta: ${nama}`;
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });

      el("#prevBtn").addEventListener("click", prev);
      el("#nextBtn").addEventListener("click", next);
      el("#btnReset").addEventListener("click", resetAnswers);
      el("#btnSubmit").addEventListener("click", () => {
        if (confirm("BENIAN BAE KAU NIH CEK LAGI JAWABAN KAU TUH!"))
          submitQuiz();
      });

      // Keyboard nav: panah kiri/kanan, angka 1-4 untuk memilih A-D
      window.addEventListener("keydown", (e) => {
        if (!el("#section-quiz").classList.contains("active")) return;
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
        if (["1", "2", "3", "4"].includes(e.key)) {
          const idx = parseInt(e.key) - 1;
          state.answers[state.currentIndex] = idx;
          updateNavActive();
          renderQuestion();
        }
      });

      // Ulang dari hasil
      el("#btnUlang").addEventListener("click", () => {
        state = {
          user: state.user,
          timeLeft: 30 * 60,
          currentIndex: 0,
          answers: Array(180).fill(null),
        };
        QUESTIONS = shuffle(QUESTIONS); // acak ulang urutan
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });
    </script>
  </body>
</html>
