<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bulk KBBI Validator</title>
    <style>
      :root {
        --primary: #4a90e2;
        --success: #2ecc71;
        --danger: #e74c3c;
        --dark: #2c3e50;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: #f1f5f9;
        padding: 30px 20px;
        margin: 0;
        color: var(--dark);
      }
      .container {
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        width: 100%;
        max-width: 750px;
        margin: 0 auto;
      }
      textarea {
        width: 100%;
        height: 120px;
        padding: 12px;
        font-size: 15px;
        border: 2px solid #cbd5e1;
        border-radius: 6px;
        box-sizing: border-box;
        margin-bottom: 15px;
        resize: vertical;
        font-family: inherit;
      }
      button {
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 14px 20px;
        font-size: 16px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
        transition: background 0.2s;
      }
      button:hover {
        background-color: #357abd;
      }
      button:disabled {
        background-color: #cbd5e1;
        cursor: not-allowed;
      }

      .progress-bar {
        margin-top: 15px;
        background: #e2e8f0;
        border-radius: 4px;
        overflow: hidden;
        display: none;
      }
      .progress-fill {
        background: var(--primary);
        height: 8px;
        width: 0%;
        transition: width 0.2s;
      }

      .results-wrapper {
        margin-top: 30px;
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
      }
      .result-card {
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 20px;
        background: #f8fafc;
      }
      .card-title {
        font-weight: bold;
        margin-bottom: 10px;
        font-size: 16px;
        display: flex;
        justify-content: space-between;
      }
      .json-output {
        background: #272822;
        color: #f8f8f2;
        padding: 15px;
        border-radius: 6px;
        font-family: "Courier New", Courier, monospace;
        font-size: 13px;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 250px;
        overflow-y: auto;
      }
      .log-box {
        font-size: 13px;
        color: #64748b;
        margin-top: 5px;
        max-height: 100px;
        overflow-y: auto;
        border: 1px solid #e2e8f0;
        padding: 8px;
        border-radius: 4px;
        background: white;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Massal Validator Kata KBBI</h2>
      <p style="color: #64748b; font-size: 14px; margin-top: -5px">
        Masukkan daftar kata yang ingin diperiksa. Pisahkan antar kata dengan
        <b>koma (,)</b> atau <b>baris baru (Enter)</b>.
      </p>

      <textarea
        id="list-input"
        placeholder="Contoh input:&#10;analisa, apotik, biosfir, khotbah&#10;atau tulis satu kata per baris..."
      ></textarea>
      <button id="process-btn" onclick="processBulkWords()">
        Proses & Verifikasi Semua Kata
      </button>

      <div class="progress-bar" id="progress-container">
        <div class="progress-fill" id="progress-element"></div>
      </div>
      <div id="status-log" class="log-box" style="display: none"></div>

      <div class="results-wrapper" id="results-area" style="display: none">
        <div class="result-card">
          <div class="card-title" style="color: var(--success)">
            <span>📦 Hasil Generate Array (Siap Salin ke wordBank Kuis)</span>
            <span id="counter-pairs" style="font-size: 14px; color: #64748b"
              >0 Pasang ditemukan</span
            >
          </div>
          <div class="json-output" id="json-result-box">
            // Hasil akan muncul di sini...
          </div>
        </div>
      </div>
    </div>

    <script>
      // Fungsi pembantu untuk memberi jeda (agar API tidak memblokir karena request terlalu cepat)
      const delay = (ms) => new Promise((res) => setTimeout(res, ms));

      async function processBulkWords() {
        const inputRaw = document.getElementById("list-input").value;
        const btn = document.getElementById("process-btn");
        const progressContainer = document.getElementById("progress-container");
        const progressElement = document.getElementById("progress-element");
        const statusLog = document.getElementById("status-log");
        const resultsArea = document.getElementById("results-area");
        const jsonResultBox = document.getElementById("json-result-box");
        const counterPairs = document.getElementById("counter-pairs");

        // 1. Parsing input: pisahkan berdasarkan koma atau enter, bersihkan spasi, abaikan jika kosong
        let words = inputRaw
          .split(/[\n,]+/)
          .map((w) => w.trim().toLowerCase())
          .filter((w) => w.length > 0);

        // Hilangkan duplikasi input dari user agar hemat kuota API
        words = [...new Set(words)];

        if (words.length === 0) {
          alert("Silakan masukkan minimal satu kata terlebih dahulu.");
          return;
        }

        // Reset UI posisi memproses
        btn.disabled = true;
        btn.textContent = "Sedang Memproses...";
        progressContainer.style.display = "block";
        statusLog.style.display = "block";
        resultsArea.style.display = "block";
        statusLog.innerHTML = "Memulai pemindaian lema...";

        let validPairs = [];
        let totalProcessed = 0;

        for (let word of words) {
          totalProcessed++;
          // Update Progress Bar
          let percent = Math.round((totalProcessed / words.length) * 100);
          progressElement.style.width = percent + "%";

          statusLog.innerHTML += `<br>🔎 Memeriksa kata: "${word}"...`;
          statusLog.scrollTop = statusLog.scrollHeight;

          try {
            const response = await fetch(
              `https://kbbi-api-zhirrr.vercel.app/api/kbbi?text=${word}`,
            );
            const data = await response.json();

            if (data && data.lema && data.arti) {
              const artiKata = data.arti.join(" ");

              // Cek pola kata tidak baku
              if (
                artiKata.includes("→") ||
                artiKata.toLowerCase().includes("bentuk tidak baku")
              ) {
                let kataBaku = "KATA_BAKU";

                if (artiKata.includes("→")) {
                  const parts = artiKata.split("→");
                  if (parts[1]) {
                    // Ambil kata pertama setelah tanda panah dan bersihkan karakter non-huruf
                    kataBaku = parts[1]
                      .trim()
                      .split(" ")[0]
                      .replace(/[^a-zA-Z]/g, "")
                      .toLowerCase();
                  }
                }

                validPairs.push({ baku: kataBaku, tidak_baku: word });
              }
              // Jika kata tersebut ternyata adalah kata baku, kita skip/abaikan
              // karena kuis membutuhkan pasangannya (kata tidak bakunya).
            } else {
              statusLog.innerHTML += ` <span style="color:var(--danger)">[Tidak ditemukan di KBBI]</span>`;
            }
          } catch (err) {
            statusLog.innerHTML += ` <span style="color:var(--danger)">[Eror Jaringan]</span>`;
            console.error(err);
          }

          // Beri jeda kecil 400ms antar request agar aman dari rate-limit server API
          await delay(400);
        }

        // 3. Tampilkan hasil akhir setelah perulangan selesai
        btn.disabled = false;
        btn.textContent = "Proses & Verifikasi Semua Kata";
        statusLog.innerHTML += `<br><b>✅ Selesai! Berhasil memproses ${words.length} kata.</b>`;
        statusLog.scrollTop = statusLog.scrollHeight;

        if (validPairs.length > 0) {
          counterPairs.textContent = `${validPairs.length} Pasang ditemukan`;

          // Format keluaran menjadi teks string array objek JS yang rapi
          let outputString = "[\n";
          validPairs.forEach((pair, idx) => {
            outputString += `    { baku: "${pair.baku}", tidak_baku: "${pair.tidak_baku}" }${idx < validPairs.length - 1 ? "," : ""}\n`;
          });
          outputString += "]";

          jsonResultBox.textContent = outputString;
        } else {
          counterPairs.textContent = "0 Pasang ditemukan";
          jsonResultBox.textContent =
            "// Tidak ditemukan kata tidak baku dari daftar yang Anda masukkan.\n// Pastikan kata yang Anda masukkan adalah variasi salahnya (misal: analisa, apotik).";
        }
      }
    </script>
  </body>
</html>
