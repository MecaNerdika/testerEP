<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penalaran Analitis</title>
    <style>
      :root {
        --bg: #060000; /* slate-900 */
        --card: #111827; /* gray-900 */
        --muted: #334155; /* slate-600 */
        --text: #ffffff; /* gray-200 */
        --accent: #38bdf8; /* sky-400 */
        --accent-2: #22c55e; /* green-500 */
        --danger: #ef4444; /* red-500 */
        --warn: #f59e0b; /* amber-500 */
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        background:
          radial-gradient(1200px 800px at 10% -10%, #1e293b, transparent),
          radial-gradient(800px 600px at 120% 0%, #0b3b47, transparent),
          var(--bg);
        color: var(--text);
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .app {
        width: 100%;
        max-width: 980px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: 0.5px;
        font-size: clamp(18px, 3.5vw, 24px);
      }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        padding: 10px 14px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #1f2a44;
        box-shadow: var(--shadow);
      }
      .card {
        background: linear-gradient(180deg, #0b1220, #0a1020);
        border: 1px solid #1f2a44;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .section {
        display: none;
      }
      .active {
        display: block;
      }
      .card-inner {
        padding: 20px;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }
      .grid-responsive {
        grid-template-columns: 1fr;
      }
      @media (min-width: 720px) {
        .grid-responsive {
          grid-template-columns: 1fr 320px;
        }
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #26314d;
        background: #0b1220;
        color: var(--text);
        outline: none;
        box-shadow: inset 0 0 0 9999px rgba(255, 255, 255, 0);
      }
      label {
        font-size: 14px;
        color: #cbd5e1;
      }
      .btn {
        cursor: pointer;
        padding: 12px 16px;
        border-radius: 14px;
        background: var(--accent);
        color: #001219;
        border: none;
        font-weight: 700;
        box-shadow: var(--shadow);
        transition: 0.2s transform ease;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn.secondary {
        background: #1f2937;
        color: #e2e8f0;
        border: 1px solid #334155;
      }
      .btn.warn {
        background: var(--warn);
        color: #0b1220;
      }
      .btn.danger {
        background: var(--danger);
        color: #0b1220;
      }
      .muted {
        color: #94a3b8;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #223156;
        font-size: 12px;
        color: #cbd5e1;
      }

      .question-area {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .q-title {
        font-weight: 400;
        font-size: 15px;
      }
      .choices {
        display: grid;
        gap: 10px;
      }
      .choice {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        border: 1px solid #1f2a44;
        background: #0b1220;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
      }
      .choice input {
        margin-top: 4px;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        max-height: 240px;
        overflow: auto;
        padding: 10px;
      }
      .nav button {
        width: 44px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid #1f2a44;
        background: #0b1220;
        color: #cbd5e1;
        font-weight: 700;
        cursor: pointer;
      }
      .nav button.active {
        outline: 2px solid var(--accent);
        color: #0ea5e9;
      }
      .nav button.done {
        background: #07291f;
        border-color: #0b7a53;
        color: #34d399;
      }

      .footer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 10px;
      }

      .legend {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .results {
        display: grid;
        gap: 12px;
      }
      .score-box {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .score-card {
        background: #0b1220;
        border: 1px solid #1f2a44;
        border-radius: 14px;
        padding: 14px;
      }

      .info-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">Penalaran Analitis</div>
        <div class="pill" id="infoUser">Belum login</div>
        <div class="timer" id="timer">--:--</div>
      </header>

      <!-- SECTION 1: FORM MINIMAL -->
      <section id="section-form" class="section active">
        <div class="card">
          <div class="card-inner grid">
            <div>
              <h2 style="margin: 0 0 10px 0">Masuk Kuis</h2>
              <p class="muted" style="margin-top: 0">
                Masukkan nama dan password untuk memulai. Tidak ada pengaturan
                tambahan.
              </p>
              <div class="grid">
                <div>
                  <label for="nama">Nama</label>
                  <input id="nama" type="text" placeholder="Nama peserta" />
                </div>
                <div>
                  <label for="pass">Password</label>
                  <input id="pass" type="password" placeholder="Password" />
                </div>
                <button class="btn" id="btnMulai">Mulai Kuis</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 2: QUIZ -->
      <section id="section-quiz" class="section">
        <div class="grid grid-responsive">
          <div class="card">
            <div class="card-inner">
              <div class="info-row">
                <div class="pill" id="infoKategori">Kategori: -</div>
                <div class="pill" id="infoSoal">Soal 0 / 180</div>
              </div>
              <div class="question-area" id="questionArea">
                <!-- Question inject here -->
              </div>
              <div class="footer-actions">
                <button class="btn secondary" id="prevBtn">Prev</button>
                <div class="legend">
                  <span class="pill">• Biru = aktif</span>
                  <span
                    class="pill"
                    style="
                      background: #07291f;
                      color: #34d399;
                      border-color: #0b7a53;
                    "
                    >• Hijau = terjawab</span
                  >
                </div>
                <button class="btn" id="nextBtn">Next</button>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <h3 style="margin-top: 0">Navigasi Soal</h3>
              <div class="nav" id="nav">
                <!-- Nav buttons injected here -->
              </div>
              <div class="grid" style="margin-top: 8px">
                <button class="btn warn" id="btnSubmit">
                  Kumpulkan Jawaban
                </button>
                <button class="btn danger" id="btnReset">Reset Jawaban</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 3: HASIL -->
      <section id="section-result" class="section">
        <div class="card">
          <div class="card-inner results">
            <h2 style="margin: 0">Hasil Ujian</h2>
            <p class="muted" id="resultUser">Peserta: -</p>
            <div class="score-box">
              <div class="score-card" style="grid-column: span 2">
                <div class="muted">Total Skor</div>
                <div id="scoreTotal" style="font-size: 30px; font-weight: 900">
                  0 / 180
                </div>
              </div>
            </div>
            <div>
              <button class="btn" id="btnUlang">Mulai Lagi</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      /** UTIL **/
      const el = (sel) => document.querySelector(sel);
      const els = (sel) => Array.from(document.querySelectorAll(sel));
      const shuffle = (arr) =>
        arr
          .map((v) => [Math.random(), v])
          .sort((a, b) => a[0] - b[0])
          .map((x) => x[1]);

      /** BANK SOAL (40/40/40) **/
      // Format: {type:'sinonim'|'antonim'|'hiponim', q:'', options:['','','',''], answer: index}

      const SOAL_fungsi = [
        {
          q: "Jeff, Dennis, dan Kent mengikuti les biola di tempat yang sama. Jadwal les Jeff adalah setiap tiga hari, Dennis setiap empat hari, dan Kent setiap dua hari. Jika mereka pertama kali bertemu di tempat les piano tersebut pada 15 Desember 2015, kapan mereka akan bertemu lagi di sana?",
          o: [
            "29 Desember 2015",
            "27 Desember 2015",
            "25 Desember 2015",
            "23 Desember 2015",
            "20 Desember 2015",
          ],
          a: 1,
        },
        {
          q: "Lima orang pegawai telah selesai menempuh TOEIC. Nilai yang diperoleh Brook lebih tinggi daripada Rober, Adam mendapat nilai tertinggi. Nilai Serge lebih tinggi daripada Brook. Enes mendapat nilai lebih rendah dibandingkan dengan Brook, tetapi lebih tinggi daripada Rober. Urutan kelima mahasiswa tersebut bila diurutkan mulai dari nilai yang paling rendah adalah",
          o: [
            "Enes, Rober, Brook, Serge, Adam",
            "Rober, Enes, Serge, Adam, Brook",
            "Rober, Enes, Serge, Brook, Adam",
            "Rober, Enes, Brook, Serge, Adam",
            "Brook, Rober, Enes, Serge, Adam",
          ],
          a: 3,
        },
        {
          q: "Konsumen menyukai laptop yang baterainya tahan lama (tahan 4 jam atau lebih), harga di bawah 6 juta, dan memiliki RAM besar (4 GB atau lebih). Laptop A baterainya tahan 6 jam, harganya 6 juta dengan RAM 4 GB. Laptop B baterainya tahan 4 jam dengan harga 5 juta serta memiliki RAM 8 GB. Laptop C memiliki harga 5,5 juta dengan baterai tahan 5 jam dan RAM 8 GB. Dapat disimpulkan",
          o: [
            "laptop A paling laku",
            "laptop C paling laku",
            "laptop B paling laku",
            "laptop A, B, C sama lakunya",
            "laptop A dan C sama lakunya",
          ],
          a: 3,
        },
        {
          q: "Dari lima orang HRD: Clarkson, Russel, dan Bryant suka futsal. Randle dan Roy tidak suka futsal. Russel dan Randle memakai kacamata. Siapakah yang kacamatanya jatuh ketika bermain futsal?",
          o: ["Roy", "Randle", "Bryant", "Russel", "Clarkson"],
          a: 3,
        },
        {
          q: "Suatu perusahaan mewajibkan karyawannya untuk mengenakan seragam setiap hari kerja. Warna seragam yang dikenakan adalah merah, kuning, hijau, biru, dan putih. Seragam merah harus dikenakan di hari Rabu, seragam kuning tidak pernah digunakan di hari Jumat dan dikenakan setelah seragam hijau. Sedangkan seragam biru digunakan sebelum seragam putih. Bila hari kerja dari Senin sampai dengan Jumat, maka urutan seragam yang dikenakan adalah",
          o: [
            "kuning, hijau, merah, biru, putih",
            "hijau, kuning, merah, putih, biru",
            "biru, putih, merah, kuning, hijau",
            "kuning, hijau, merah, putih, biru",
            "hijau, kuning, merah, biru, putih",
          ],
          a: 4,
        },
        {
          q: "K, L, M, N, dan O adalah lima orang diplomat. K hanya dapat berbicara bahasa Mandarin dan Jepang. L hanya dapat berbicara dalam bahasa Arab, Inggris, dan Perancis. M hanya dapat berbicara bahasa Jepang. N hanya dapat berbicara dalam bahasa Mandarin, Inggris, dan Perancis. O hanya dapat berbicara dalam bahasa Arab dan Jepang. Pasangan diplomat yang harus menggunakan penerjemah dalam berkomunikasi adalah",
          o: ["M dan O", "K dan M", "L dan M", "L dan N", "K dan O"],
          a: 2,
        },
        {
          q: "Nilai IELTS Jose lebih tinggi dari Aaron dan lebih rendah dari Carmelo. Nilai IELTS Robin lebih lebih rendah dari Jose, tetapi lebih tinggi dari Aaron. Nilai IELTS Derrick lebih tinggi dari Aaron dan Robin. Tiga orang berprestasi terbaik adalah ....",
          o: [
            "Carmelo, Robin, Aaron",
            "Jose, Derrick, Robin",
            "Jose, Carmelo, Robin",
            "Derrick, Aaron, Carmelo",
            "Derrick, Jose, Carmelo",
          ],
          a: 4,
        },
        {
          q: "Lima orang pebalap MotoGP sedang membalap di Sirkuit Internasional Sentul. Pedrosa berhasil melewati Iannone, tetapi tidak pernah dapat mengejar Marquez. Rossi gagal mengejar Lorenzo, tetapi berhasil melewati Marquez. Pembalap yang berada di urutan terakhir adalah ....",
          o: ["Lorenzo", "Rossi", "Marquez", "Iannone", "Pedrosa"],
          a: 3,
        },
        {
          q: "Di sebuah pasar daging, harga daging Wagyu lebih mahal daripada harga daging Prime, harga daging Prime lebih mahal daripada harga daging Choice, dan daging Kobe adalah yang paling mahal. Dapat disimpulkan",
          o: [
            "daging Wagyu lebih mahal daripada daging Kobe",
            "daging Choice lebih mahal daripada daging Wagyu",
            "daging Kobe lebih mahal daripada daging Wagyu",
            "daging Choice lebih mahal daripada daging Kobe",
            "daging Prime lebih mahal daripada daging Kobe",
          ],
          a: 2,
        },
        {
          q: "Tujuh orang pegawai peserta studi banding harus menginap dalam dua kamar. Kamar pertama memuat empat orang. Andy tidak mau sekamar dengan Greg. Dion merasa tertekan jika ada Chris dan Ben. Chris ingin sekamar dengan Ben. Eric tidak ingin sekamar dengan Fran jika Ben sekamar dengan Andy. Berdasarkan kondisi tersebut, bagaimanakah pembagian kamar yang paling memungkinkan?",
          o: [
            "Kamar 1: Greg, Fran, Eric, Chris; Kamar 2: Ben, Dion, Andy",
            "Kamar 1: Andy, Fran, Ben, Eric; Kamar 2: Greg, Chris, Dion",
            "Kamar 1: Greg, Fran, Dion, Andy; Kamar 2: Chris, Ben, Eric",
            "Kamar 1: Andy, Eric, Chris, Ben; Kamar 2: Greg, Fran, Dion",
            "Kamar 1: Greg, Ben, Chris, Dion; Kamar 2: Andy, Eric, Fran",
          ],
          a: 3,
        },
        {
          q: "Berikut perbandingan jadwal kedatangan antara kapal laut dan pesawat jurusan Surabaya-Makassar. Jika kapal laut berangkat dari Makassar pada pukul 14.00 dan sampai di Surabaya memakan waktu 15 jam, pukul berapakah pesawat sampai di Surabaya dalam jadwal keberangkatan yang sama jika selisih waktu kedua alat transportasi tersebut adalah 13 jam?",
          o: ["19.00", "18.00", "17.00", "16.00", "15.00"],
          a: 4,
        },
        {
          q: "Semua orang suku F berkulit putih, berambut lurus, dan berbadan kurus. Semua suku bangsa G berkulit merah dan berambut lurus. Sedikit sekali orang suku H yang berambut lurus. Mike dilahirkan di daerah H, berambut lurus, dan berkulit hitam.",
          o: [
            "Mike pasti bukan orang suku H.",
            "Mike pasti bukan orang suku G.",
            "Mike bukan orang suku F dan G.",
            "Mike pasti bukan orang suku F.",
            "Mike bukan orang suku F, G, atau H.",
          ],
          a: 2,
        },
        {
          q: "Enam buah arsip ditata dari kiri ke kanan. Arsip pajak tidak diletakkan di sebelah arsip bank atau arsip koperasi. Arsip utang diletakkan bersebelahan dengan arsip koperasi. Arsip pajak ditata dekat dengan arsip gaji dan arsip gaji diletakkan di sebelah arsip utang. Arsip bank berada di paling kiri. Arsip legal di sebelah kiri arsip pajak. Arsip koperasi ada di ujung kanan. Arsip yang berada di urutan ketiga dari kiri adalah ....",
          o: ["pajak", "gaji", "koperasi", "legal", "utang"],
          a: 0,
        },
        {
          q: "Data nilai TOEFL pegawai administrasi menunjukkan bahwa nilai TOEFL Stephen lebih tinggi daripada Klay. Nilai TOEFL Barnes sama dengan Dray dan nilai TOEFL Andrew lebih tinggi daripada Lee. Jika nilai TOEFL Barnes lebih tinggi dari Klay dan nilai TOEFL Andrew sama dengan Klay, maka pernyataan yang benar adalah ....",
          o: [
            "Nilai Lee lebih tinggi daripada Dray.",
            "Nilai Andrew lebih tinggi daripada Dray.",
            "Nilai Barnes lebih tinggi daripada Stephen.",
            "Nilai Dray lebih tinggi daripada Klay.",
            "Nilai Stephen lebih tinggi daripada Dray.",
          ],
          a: 3,
        },
        {
          q: "Lima orang pegawai bernama Paul, Quinn, Randy, Smith, dan Tony. Catatan pinjaman uang di koperasi menunjukkan bahwa jumlah yang dipinjam Smith tidak lebih banyak dibandingkan Randy dan Paul, tetapi juga bukan yang paling sedikit. Tony lebih banyak dibandingkan Paul dan Quinn, namun Tony selalu lebih sedikit dibandingkan Randy. Urutan jumlah pinjaman dari yang terbanyak adalah",
          o: [
            "Tony, Paul, Randy, Smith, Quinn",
            "Randy, Paul, Smith, Tony, Quinn",
            "Randy, Tony, Paul, Quinn, Smith",
            "Randy, Tony, Quinn, Smith, Paul",
            "Randy, Tony, Paul, Smith, Quinn",
          ],
          a: 4,
        },
        {
          q: "Lima pemain basket: A, B, C, D, dan E memiliki usia yang berbeda-beda. Umur A saat ini adalah 20 tahun, lebih muda 3 tahun dibandingkan D serta lebih tua 1 tahun dibandingkan C dan 2 tahun dibandingkan E, namun E bukanlah yang paling muda. Usia paling muda dari kelima pemain basket tersebut adalah 17 tahun. Jika diurutkan dari yang paling muda, urutan yang benar adalah ....",
          o: [
            "B, C, E, A, D",
            "C, E, B, A, D",
            "B, A, E, C, D",
            "B, E, C, A, D",
            "B, A, C, E, D",
          ],
          a: 3,
        },
        {
          q: "Terdapat 6 atlet basket: Carter, Giannis, Kris, Parker, Monroe, dan Henson. Carter mampu melompat lebih tinggi dari Giannis. Lompatan Parker dan Henson sama tingginya. Lompatan Kris lebih tinggi daripada Monroe. Jika lompatan Parker lebih tinggi daripada Carter, maka ....",
          o: [
            "Parker melompat lebih tinggi dari semuanya",
            "Parker melompat lebih tinggi daripada Giannis",
            "Henson melompat lebih tinggi daripada Giannis",
            "Henson melompat lebih tinggi daripada Kris",
            "Carter hanya dikalahkan oleh Parker",
          ],
          a: 1,
        },
        {
          q: "Pada fase kualifikasi piala dunia, grup A dihuni oleh Aljazair, Brazil, Ceko, dan Indonesia. Setiap tim akan bertanding satu kali melawan tim lainnya. Nilai yang diberikan yakni 3 poin untuk tim yang menang, 1 poin untuk masing-masing tim yang bermain imbang (seri), dan 0 poin untuk tim yang kalah. Jika Aljazair satu kali kalah, Brazil selalu kalah, dan Ceko dua kali seri, maka juara grup A adalah",
          o: [
            "Indonesia",
            "Aljazair",
            "Ceko",
            "Aljazair dan Ceko dengan poin sama",
            "Ceko dan Indonesia dengan poin sama",
          ],
          a: 0,
        },
        {
          q: "Tiga tim sepak takraw harus dibentuk dengan masing-masing tim terdiri atas tiga orang. R harus berada dalam satu tim dengan U, S tidak boleh satu tim dengan T atau X, T tidak boleh dipisahkan dengan Z. V dan Y harus berada dalam satu tim yang sama dengan S, sedangkan W harus dipisahkan dengan R. Komposisi untuk tiap tim yang dapat dibentuk adalah ....",
          o: [
            "(RUZ) - (SVY) - (TXW)",
            "(RUW) - (SVY) - (TZX)",
            "(RUX) - (SVY) - (TZW)",
            "(RZW) - (SVY) - (TUW)",
            "(RUX) - (SZY) - (TVW)",
          ],
          a: 2,
        },
        {
          q: "Thomas lebih tua daripada Bradley, Crowder lebih muda daripada Amir, Jared lebih muda daripada Bradley, dan Thomas lebih muda daripada Crowder. Di antara kelima orang tersebut, yang termuda adalah ....",
          o: ["Jared", "Thomas", "Crowder", "Amir", "Bradley"],
          a: 0,
        },
      ].map((x) => ({
        type: "Penalaran",
        q: x.q,
        options: x.o,
        answer: x.a,
      }));

      S_fungsi = shuffle(SOAL_fungsi);

      /*  Validasi jumlah
                                  if(SINONIM.length!==90||ANTONIM.length!==90){
                                    console.warn('Jumlah soal tidak 90/90:', SINONIM.length, ANTONIM.length);
                                  }  */

      // /* Gabung & acak
      function shuffleOptions(q) {
        let opts = q.options.map((opt, i) => ({ opt, i }));
        opts = shuffle(opts); // pake fungsi shuffle yang sudah kamu punya
        let newAnswer = opts.findIndex((o) => o.i === q.answer);
        return {
          ...q,
          options: opts.map((o) => o.opt),
          answer: newAnswer,
        };
      }
      //*/
      let QUESTIONS = [...S_fungsi].map((q, i) => ({
        id: i + 1,
        ...shuffleOptions(q),
      }));
      // let QUESTIONS = [...SINONIM, ...ANTONIM].map((q,i)=>({id:i+1, ...q }));
      // State
      let state = {
        user: null,
        timeLeft: 15 * 60, // 25 menit
        currentIndex: 0,
        answers: Array(180).fill(null), // simpan index jawaban (0..3) atau null
      };

      /** RENDERING **/
      function formatTime(s) {
        const m = Math.floor(s / 60)
          .toString()
          .padStart(2, "0");
        const r = (s % 60).toString().padStart(2, "0");
        return `${m}:${r}`;
      }

      function renderTimer() {
        el("#timer").textContent = formatTime(state.timeLeft);
        if (state.timeLeft <= 60) {
          el("#timer").style.background = "#331a1a";
          el("#timer").style.borderColor = "#7f1d1d";
        }
        if (state.timeLeft <= 0) {
          submitQuiz();
        }
      }

      let tick = null;
      function startTimer() {
        if (tick) clearInterval(tick);
        const waktuTarget = Date.now() + state.timeLeft * 1000;
        tick = setInterval(() => {
          const waktuSekarang = Date.now();

          state.timeLeft = Math.ceil((waktuTarget - waktuSekarang) / 1000);

          if (state.timeLeft > 0) {
            renderTimer();
          } else {
            state.timeLeft = 0;
            renderTimer();
            clearInterval(tick);
          }
        }, 200);
      }

      function mountNav() {
        const nav = el("#nav");
        nav.innerHTML = "";
        QUESTIONS.forEach((q, idx) => {
          const b = document.createElement("button");
          b.textContent = idx + 1;
          b.addEventListener("click", () => {
            goTo(idx);
          });
          nav.appendChild(b);
        });
        updateNavActive();
      }

      function updateNavActive() {
        const buttons = els("#nav button");
        buttons.forEach((b, idx) => {
          b.classList.toggle("active", idx === state.currentIndex);
          b.classList.toggle("done", state.answers[idx] !== null);
        });
        el("#infoSoal").textContent = `Soal ${state.currentIndex + 1} / ${
          QUESTIONS.length
        }`;
        el("#infoKategori").textContent = `Kategori: ${QUESTIONS[
          state.currentIndex
        ].type.toUpperCase()}`;
      }

      function renderQuestion() {
        const q = QUESTIONS[state.currentIndex];
        const container = el("#questionArea");
        container.innerHTML = "";
        const title = document.createElement("div");
        title.className = "q-title";

        title.innerHTML = q.q;
        container.appendChild(title);

        const list = document.createElement("div");
        list.className = "choices";
        q.options.forEach((opt, i) => {
          const row = document.createElement("label");
          row.className = "choice";
          const input = document.createElement("input");
          input.type = "radio";
          input.name = "choice";
          input.value = i;
          input.checked = state.answers[state.currentIndex] === i;
          input.addEventListener("change", () => {
            state.answers[state.currentIndex] = i;
            updateNavActive();
          });
          const span = document.createElement("div");
          span.innerHTML = opt;
          row.appendChild(input);
          row.appendChild(span);
          list.appendChild(row);
        });
        container.appendChild(list);
        MathJax.typeset();
      }

      function goTo(idx) {
        state.currentIndex = Math.max(0, Math.min(QUESTIONS.length - 1, idx));
        updateNavActive();
        renderQuestion();
      }

      function next() {
        if (state.currentIndex < QUESTIONS.length - 1) {
          goTo(state.currentIndex + 1);
        }
      }
      function prev() {
        if (state.currentIndex > 0) {
          goTo(state.currentIndex - 1);
        }
      }

      function resetAnswers() {
        if (!confirm("Yakin reset semua jawaban?")) return;
        state.answers = Array(QUESTIONS.length).fill(null);
        updateNavActive();
        renderQuestion();
      }

      function submitQuiz() {
        // hitung skor per kategori
        let sSin = 0,
          sAnt = 0,
          sHip = 0;
        QUESTIONS.forEach((q, idx) => {
          const pick = state.answers[idx];
          const correct = q.answer;
          if (pick === correct) {
            if (q.type === "Penalaran") sSin++;
          }
        });
        const total = sSin + sAnt + sHip;

        // tampilkan
        let total_question = QUESTIONS.length;

        el("#scoreTotal").textContent = `${total} / ${total_question}`;
        el("#resultUser").textContent = `Peserta: ${
          state.user?.nama || "-"
        } (waktu habis/kumpul)`;

        // stop timer, ganti section
        if (tick) clearInterval(tick);
        showSection("result");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showSection(which) {
        el("#section-form").classList.remove("active");
        el("#section-quiz").classList.remove("active");
        el("#section-result").classList.remove("active");
        if (which === "form") el("#section-form").classList.add("active");
        if (which === "quiz") el("#section-quiz").classList.add("active");
        if (which === "result") el("#section-result").classList.add("active");
      }

      // EVENTS
      el("#btnMulai").addEventListener("click", () => {
        const nama = el("#nama").value.trim();
        const pass = el("#pass").value.trim();
        if (!nama || !pass) {
          alert("Nama dan password wajib diisi.");
          return;
        }
        if (pass !== "AK47M") {
          alert(
            "password salah! tanya password ke sir hardi. klo sir hardi dak tau tanya ke sir meca",
          );
          return;
        }
        state.user = { nama, pass };
        el("#infoUser").textContent = `Peserta: ${nama}`;
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });

      el("#prevBtn").addEventListener("click", prev);
      el("#nextBtn").addEventListener("click", next);
      el("#btnReset").addEventListener("click", resetAnswers);
      el("#btnSubmit").addEventListener("click", () => {
        if (confirm("BENIAN BAE KAU NIH CEK LAGI JAWABAN KAU TUH!"))
          submitQuiz();
      });

      // Keyboard nav: panah kiri/kanan, angka 1-4 untuk memilih A-D
      window.addEventListener("keydown", (e) => {
        if (!el("#section-quiz").classList.contains("active")) return;
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
        if (["1", "2", "3", "4"].includes(e.key)) {
          const idx = parseInt(e.key) - 1;
          state.answers[state.currentIndex] = idx;
          updateNavActive();
          renderQuestion();
        }
      });

      // Ulang dari hasil
      el("#btnUlang").addEventListener("click", () => {
        state = {
          user: state.user,
          timeLeft: 5 * 60,
          currentIndex: 0,
          answers: Array(180).fill(null),
        };
        QUESTIONS = shuffle(QUESTIONS); // acak ulang urutan
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });
    </script>
  </body>
</html>
