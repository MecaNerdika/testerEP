<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SKD CPNS dan Kedinasan TWK</title>
    <style>
      :root {
        --bg: #060000; /* slate-900 */
        --card: #111827; /* gray-900 */
        --muted: #334155; /* slate-600 */
        --text: #ffffff; /* gray-200 */
        --accent: #38bdf8; /* sky-400 */
        --accent-2: #22c55e; /* green-500 */
        --danger: #ef4444; /* red-500 */
        --warn: #f59e0b; /* amber-500 */
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        background:
          radial-gradient(1200px 800px at 10% -10%, #1e293b, transparent),
          radial-gradient(800px 600px at 120% 0%, #0b3b47, transparent),
          var(--bg);
        color: var(--text);
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .app {
        width: 100%;
        max-width: 980px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: 0.5px;
        font-size: clamp(18px, 3.5vw, 24px);
      }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        padding: 10px 14px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #1f2a44;
        box-shadow: var(--shadow);
      }
      .card {
        background: linear-gradient(180deg, #0b1220, #0a1020);
        border: 1px solid #1f2a44;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .section {
        display: none;
      }
      .active {
        display: block;
      }
      .card-inner {
        padding: 20px;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }
      .grid-responsive {
        grid-template-columns: 1fr;
      }
      @media (min-width: 720px) {
        .grid-responsive {
          grid-template-columns: 1fr 320px;
        }
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #26314d;
        background: #0b1220;
        color: var(--text);
        outline: none;
        box-shadow: inset 0 0 0 9999px rgba(255, 255, 255, 0);
      }
      label {
        font-size: 14px;
        color: #cbd5e1;
      }
      .btn {
        cursor: pointer;
        padding: 12px 16px;
        border-radius: 14px;
        background: var(--accent);
        color: #001219;
        border: none;
        font-weight: 700;
        box-shadow: var(--shadow);
        transition: 0.2s transform ease;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn.secondary {
        background: #1f2937;
        color: #e2e8f0;
        border: 1px solid #334155;
      }
      .btn.warn {
        background: var(--warn);
        color: #0b1220;
      }
      .btn.danger {
        background: var(--danger);
        color: #0b1220;
      }
      .muted {
        color: #94a3b8;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #223156;
        font-size: 12px;
        color: #cbd5e1;
      }

      .question-area {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .q-title {
        font-weight: 400;
        font-size: 12px;
      }
      .choices {
        display: grid;
        gap: 10px;
      }
      .choice {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        border: 1px solid #1f2a44;
        background: #0b1220;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
      }
      .choice input {
        margin-top: 4px;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        max-height: 240px;
        overflow: auto;
        padding: 10px;
      }
      .nav button {
        width: 44px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid #1f2a44;
        background: #0b1220;
        color: #cbd5e1;
        font-weight: 700;
        cursor: pointer;
      }
      .nav button.active {
        outline: 2px solid var(--accent);
        color: #0ea5e9;
      }
      .nav button.done {
        background: #07291f;
        border-color: #0b7a53;
        color: #34d399;
      }

      .footer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 10px;
      }

      .legend {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .results {
        display: grid;
        gap: 12px;
      }
      .score-box {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .score-card {
        background: #0b1220;
        border: 1px solid #1f2a44;
        border-radius: 14px;
        padding: 14px;
      }

      .info-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">kuiz TWK 4 Pilar</div>
        <div class="pill" id="infoUser">Belum login</div>
        <div class="timer" id="timer">15:00</div>
      </header>

      <!-- SECTION 1: FORM MINIMAL -->
      <section id="section-form" class="section active">
        <div class="card">
          <div class="card-inner grid">
            <div>
              <h2 style="margin: 0 0 10px 0">Masuk Kuis</h2>
              <p class="muted" style="margin-top: 0">
                Masukkan nama dan password untuk memulai. Tidak ada pengaturan
                tambahan.
              </p>
              <div class="grid">
                <div>
                  <label for="nama">Nama</label>
                  <input id="nama" type="text" placeholder="Nama peserta" />
                </div>
                <div>
                  <label for="pass">Password</label>
                  <input id="pass" type="password" placeholder="Password" />
                </div>
                <button class="btn" id="btnMulai">Mulai Kuis</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 2: QUIZ -->
      <section id="section-quiz" class="section">
        <div class="grid grid-responsive">
          <div class="card">
            <div class="card-inner">
              <div class="info-row">
                <div class="pill" id="infoKategori">Kategori: -</div>
                <div class="pill" id="infoSoal">Soal 0 / 180</div>
              </div>
              <div class="question-area" id="questionArea">
                <!-- Question inject here -->
              </div>
              <div class="footer-actions">
                <button class="btn secondary" id="prevBtn">Prev</button>
                <div class="legend">
                  <span class="pill">• Biru = aktif</span>
                  <span
                    class="pill"
                    style="
                      background: #07291f;
                      color: #34d399;
                      border-color: #0b7a53;
                    "
                    >• Hijau = terjawab</span
                  >
                </div>
                <button class="btn" id="nextBtn">Next</button>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <h3 style="margin-top: 0">Navigasi Soal</h3>
              <div class="nav" id="nav">
                <!-- Nav buttons injected here -->
              </div>
              <div class="grid" style="margin-top: 8px">
                <button class="btn warn" id="btnSubmit">
                  Kumpulkan Jawaban
                </button>
                <button class="btn danger" id="btnReset">Reset Jawaban</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 3: HASIL -->
      <section id="section-result" class="section">
        <div class="card">
          <div class="card-inner results">
            <h2 style="margin: 0">Hasil Ujian</h2>
            <p class="muted" id="resultUser">Peserta: -</p>
            <div class="score-box">
              <div class="score-card" style="grid-column: span 2">
                <div class="muted">Total Skor</div>
                <div id="scoreTotal" style="font-size: 30px; font-weight: 900">
                  0 / 180
                </div>
              </div>
            </div>
            <div>
              <button class="btn" id="btnUlang">Mulai Lagi</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      /** UTIL **/
      const el = (sel) => document.querySelector(sel);
      const els = (sel) => Array.from(document.querySelectorAll(sel));
      const shuffle = (arr) =>
        arr
          .map((v) => [Math.random(), v])
          .sort((a, b) => a[0] - b[0])
          .map((x) => x[1]);

      /** BANK SOAL (40/40/40) **/
      // Format: {type:'sinonim'|'antonim'|'hiponim', q:'', options:['','','',''], answer: index}

      const SOAL_fungsi = [
        {
          q: "Pancasila berkedudukan sebagai pandangan hidup bangsa (weltanschauung). Makna dari kedudukan tersebut tercermin dalam pernyataan di bawah ini, kecuali ...",
          o: [
            "Menjadi kerangka acuan dalam bertindak dan memecahkan masalah dalam kehidupan sehari-hari.",
            "Menjadi kristalisasi nilai-nilai luhur yang diyakini kebenarannya oleh seluruh elemen bangsa.",
            "Menjadi aturan teknis yang mengatur tata cara persidangan perkara perdata di pengadilan.",
            "Menjadi filter atau penyaring terhadap masuknya nilai-nilai asing yang tidak sesuai dengan jati diri bangsa.",
            "Menjadi pengarah perilaku individu agar selaras dengan norma moral masyarakat Indonesia.",
          ],
          a: 2,
        },
        {
          q: "Dalam kehidupan bertetangga, pengamalan butir Pancasila sila ke-2 'mengembangkan sikap saling mencintai sesama manusia' paling tepat tercermin melalui sikap ...",
          o: [
            "Menghadiri undangan rapat RT demi menjaga formalitas hubungan antarwarga.",
            "Memberikan bantuan tanpa membedakan latar belakang kepada tetangga yang sedang mengalami musibah.",
            "Menolak berdiskusi mengenai perbedaan paham keagamaan agar tidak terjadi perpecahan.",
            "Menyelesaikan setiap perselisihan lingkungan melalui jalur hukum formal sejak awal.",
            "Menyesuaikan seluruh gaya hidup pribadi dengan tingkat ekonomi mayoritas tetangga.",
          ],
          a: 1,
        },
        {
          q: "Dalam sistem ketatanegaraan Indonesia, hubungan antara Pembukaan UUD 1945 dan Batang Tubuh UUD 1945 menunjukkan hubungan yang kausal dan organis, yaitu ...",
          o: [
            "Pembukaan UUD 1945 memuat dasar filosofis yang kemudian dijabarkan ke dalam pasal-pasal Batang Tubuh UUD 1945.",
            "Pembukaan UUD 1945 merupakan hukum administratif, sedangkan Batang Tubuh merupakan hukum pidana negara.",
            "Pembukaan UUD 1945 dapat diubah oleh MPR, sedangkan isi Batang Tubuh bersifat mutlak dan abadi.",
            "Pembukaan UUD 1945 berfungsi sebagai regulasi teknis, sementara Batang Tubuh sebagai pelengkap saja.",
            "Pembukaan UUD 1945 lahir setelah adanya kesepakatan tertulis pada pasal-pasal di Batang Tubuh.",
          ],
          a: 0,
        },
        {
          q: "Perhatikan pernyataan-pernyataan berikut!\n1) Pemerintah daerah dapat membuat regulasi apa saja selama disetujui oleh DPRD.\n2) Setiap produk hukum di Indonesia tidak boleh bertentangan dengan Pancasila.\n3) Hakim konstitusi memutus perkara pengujian undang-undang dengan bersandarkan pada nilai Pancasila.\n4) Kebijakan hukum pidana dapat mengabaikan hak asasi jika demi kepentingan politik penguasa.\n5) Pancasila menduduki posisi tertinggi dalam tata urutan norma hukum (stattsfundamentalnorm).\n6) Peraturan menteri boleh mengabaikan undang-undang demi percepatan ekonomi.\n\nManakah pernyataan yang menunjukkan Pancasila sebagai sumber dari segala sumber hukum?",
          o: [
            "1, 2, dan 4",
            "1, 3, dan 5",
            "2, 3, dan 5",
            "2, 4, dan 6",
            "3, 5, dan 6",
          ],
          a: 2,
        },
        {
          q: "Dalam kehidupan bernegara, putusan Mahkamah Agung (MA) terkait pengujian peraturan di bawah undang-undang dirasakan langsung oleh masyarakat. Contoh implementasi kewenangan MA yang paling tepat adalah ...",
          o: [
            "Kementerian terkait segera mencabut atau merevisi Peraturan Menteri setelah dinyatakan bertentangan dengan Undang-Undang oleh MA.",
            "DPR langsung membubarkan lembaga kementerian yang mengeluarkan peraturan bermasalah tersebut.",
            "Masyarakat menolak membayar pajak secara massal sebagai bentuk protes terhadap kementerian.",
            "Presiden mengeluarkan Perppu untuk membatalkan putusan hukum yang dikeluarkan oleh MA.",
            "Aparat kepolisian membuat aturan teknis baru tanpa memedulikan putusan hukum yang berlaku.",
          ],
          a: 0,
        },
        {
          q: "Pemerintah pusat memberikan jaminan perlindungan terhadap penggunaan bahasa daerah di lingkungan sekolah dasar melalui muatan lokal agar kekayaan linguistik tersebut tidak punah. Berdasarkan Pasal 32 ayat (2) UUD NRI Tahun 1945, kebijakan tersebut mencerminkan ...",
          o: [
            "Upaya menutup diri dari penggunaan bahasa asing di ruang publik.",
            "Kewajiban warga negara untuk menguasai seluruh bahasa daerah di Indonesia.",
            "Tanggung jawab negara dalam menghormati dan memelihara bahasa daerah sebagai kekayaan budaya nasional.",
            "Strategi membatasi ruang gerak bahasa Indonesia sebagai bahasa persatuan.",
            "Hak mutlak pemerintah daerah untuk memisahkan diri dari sistem pendidikan nasional.",
          ],
          a: 2,
        },
        {
          q: "Perhatikan pernyataan-pernyataan berikut!\n1) Setiap warga negara menggunakan hak pilihnya dalam pemilu secara bertanggung jawab.\n2) Anggota legislatif menyampaikan aspirasi masyarakat melalui jalur sidang paripurna resmi.\n3) Lembaga swadaya masyarakat melakukan demonstrasi anarkis untuk memaksakan kehendak kelompok.\n4) Partai politik melakukan kaderisasi kepemimpinan nasional yang berorientasi pada kepentingan bangsa.\n5) Badan Pengawas Pemilu (Bawaslu) menindak tegas setiap pelanggaran kampanye tanpa tebang pilih.\n6) Tokoh masyarakat memprovokasi warga untuk menolak hasil penghitungan suara yang sah.\n\nPerilaku yang paling mencerminkan nasionalisme di bidang politik ditunjukkan oleh nomor ...",
          o: [
            "1, 2, dan 3",
            "1, 2, dan 4",
            "1, 4, dan 5",
            "2, 4, dan 6",
            "3, 5, dan 6",
          ],
          a: 2,
        },
        {
          q: "Nasionalisme yang konstruktif tidak hanya diwujudkan melalui jargon, melainkan melalui tindakan yang mendorong kemajuan bangsa di era digital. Sikap yang paling mencerminkan hal tersebut adalah ...",
          o: [
            "Membatasi diri dari akses internet global demi menjaga orisinalitas pemikiran.",
            "Menciptakan dan mengembangkan aplikasi inovatif karya anak bangsa untuk memperluas lapangan kerja lokal.",
            "Mengecam seluruh perkembangan teknologi barat yang masuk ke pasar domestik.",
            "Mengikuti tren digital luar negeri secara berlebihan tanpa melakukan filter budaya.",
            "Menerima pasrah segala kondisi ketertinggalan teknologi karena menganggapnya sebagai takdir bangsa.",
          ],
          a: 1,
        },
        {
          q: "Penggunaan produk-produk dalam negeri di tengah gempuran barang impor komoditas sejenis merupakan wujud nyata nasionalisme ekonomi karena ...",
          o: [
            "Membantu menciptakan ketergantungan mutlak negara terhadap bantuan finansial asing.",
            "Memperkuat struktur ekonomi domestik dan menjaga kedaulatan pasar di tanah air.",
            "Menunjukkan sikap memusuhi seluruh pelaku dagang dari luar negeri.",
            "Mempermudah proses asimilasi budaya ekonomi barat di lingkungan masyarakat.",
            "Menjamin stabilitas politik kelompok tertentu yang menguasai sektor logistik.",
          ],
          a: 1,
        },
        {
          q: "Peristiwa Sumpah Pemuda 1928 menitikberatkan pada pengakuan tanah air, bangsa, dan bahasa yang satu. Perilaku berikut mencerminkan nilai nasionalisme yang relevan dengan semangat tersebut, kecuali ...",
          o: [
            "Menggunakan bahasa Indonesia sebagai alat komunikasi utama yang menyatukan perbedaan suku.",
            "Menjaga kerukunan antarumat beragama demi keutuhan bangsa di atas kepentingan golongan.",
            "Mengutamakan ego kesukuan dan menuntut keistimewaan berlebihan bagi kelompoknya sendiri.",
            "Menghargai keberagaman adat istiadat sebagai kekayaan kolektif milik bersama.",
            "Terlibat aktif dalam kegiatan yang mempromosikan persatuan nasional di kalangan generasi muda.",
          ],
          a: 2,
        },
        {
          q: "Di era modern yang penuh keterbukaan, urgensi utama dari sikap patriotisme bagi seorang Aparatur Sipil Negara (ASN) dalam menjalankan tugas pelayanan publik adalah ...",
          o: [
            "Mengejar popularitas pribadi melalui media sosial demi meningkatkan citra instansi secara instan.",
            "Menolak bekerja lembur meskipun ada tugas mendesak yang menyangkut kepentingan masyarakat luas.",
            "Mengutamakan integritas dan profesionalisme kerja di atas kepentingan pribadi guna mewujudkan tata kelola pemerintahan yang bersih.",
            "Menerima gratifikasi dalam bentuk apa pun asalkan pembagiannya merata ke seluruh rekan kerja.",
            "Mematuhi arahan atasan meskipun arahan tersebut jelas-jelas melanggar hukum dan konstitusi.",
          ],
          a: 2,
        },
        {
          q: "Upaya bela negara nirmiliter (nonfisik) dapat diwujudkan melalui profesi dan kontribusi sosial. Tindakan seorang guru di daerah pedalaman yang paling tepat mencerminkan upaya tersebut adalah ...",
          o: [
            "Mengajar anak-anak dengan ikhlas dan menanamkan nilai-nilai moral kebangsaan demi mencerdaskan kehidupan bangsa.",
            "Menuntut kenaikan fasilitas mewah kepada pemerintah sebelum bersedia mengajar di kelas.",
            "Membatasi materi pelajaran hanya pada budaya daerah lokal tempatnya mengajar saja.",
            "Menyerahkan seluruh tanggung jawab pendidikan anak kepada orang tua karena keterbatasan sarana.",
            "Mendorong siswa untuk fokus pada budaya asing agar cepat meninggalkan daerah asalnya.",
          ],
          a: 0,
        },
        {
          q: "Perhatikan pernyataan-pernyataan berikut!\n1) Mahasiswa melakukan riset teknologi tepat guna untuk membantu sistem pertanian di desa.\n2) Seorang pemuda membuat konten hoaks untuk meningkatkan jumlah pengikutnya.\n3) Kelompok pemuda menggalang dana kemanusiaan untuk korban bencana alam nasional.\n4) Seseorang membeli barang mewah selundupan untuk menghemat pengeluaran pribadinya.\n5) Anggota komunitas literasi menyediakan perpustakaan gratis bagi anak-anak kurang mampu.\n6) Pengusaha memanfaatkan celah hukum untuk menghindari kewajiban membayar pajak perusahaan.\n\nKontribusi nyata warga negara dalam bela negara nonfisik di bidang sosial-kemasyarakatan ditunjukkan oleh nomor ...",
          o: [
            "1, 2, dan 4",
            "1, 3, dan 5",
            "2, 4, dan 6",
            "2, 3, dan 5",
            "3, 4, dan 6",
          ],
          a: 1,
        },
      ].map((x) => ({
        type: "TWK 4 Pilar",
        q: x.q,
        options: x.o,
        answer: x.a,
      }));

      S_fungsi = shuffle(SOAL_fungsi);

      /*  Validasi jumlah
                      if(SINONIM.length!==90||ANTONIM.length!==90){
                        console.warn('Jumlah soal tidak 90/90:', SINONIM.length, ANTONIM.length);
                      }  */

      // /* Gabung & acak
      function shuffleOptions(q) {
        let opts = q.options.map((opt, i) => ({ opt, i }));
        opts = shuffle(opts); // pake fungsi shuffle yang sudah kamu punya
        let newAnswer = opts.findIndex((o) => o.i === q.answer);
        return {
          ...q,
          options: opts.map((o) => o.opt),
          answer: newAnswer,
        };
      }
      //*/
      let QUESTIONS = [...S_fungsi].map((q, i) => ({
        id: i + 1,
        ...shuffleOptions(q),
      }));
      // let QUESTIONS = [...SINONIM, ...ANTONIM].map((q,i)=>({id:i+1, ...q }));
      // State
      let state = {
        user: null,
        timeLeft: 20 * 60, // 25 menit
        currentIndex: 0,
        answers: Array(180).fill(null), // simpan index jawaban (0..3) atau null
      };

      /** RENDERING **/
      function formatTime(s) {
        const m = Math.floor(s / 60)
          .toString()
          .padStart(2, "0");
        const r = (s % 60).toString().padStart(2, "0");
        return `${m}:${r}`;
      }

      function renderTimer() {
        el("#timer").textContent = formatTime(state.timeLeft);
        if (state.timeLeft <= 60) {
          el("#timer").style.background = "#331a1a";
          el("#timer").style.borderColor = "#7f1d1d";
        }
        if (state.timeLeft <= 0) {
          submitQuiz();
        }
      }

      let tick = null;
      function startTimer() {
        if (tick) clearInterval(tick);
        tick = setInterval(() => {
          state.timeLeft--;
          renderTimer();
          if (state.timeLeft <= 0) clearInterval(tick);
        }, 1000);
      }

      function mountNav() {
        const nav = el("#nav");
        nav.innerHTML = "";
        QUESTIONS.forEach((q, idx) => {
          const b = document.createElement("button");
          b.textContent = idx + 1;
          b.addEventListener("click", () => {
            goTo(idx);
          });
          nav.appendChild(b);
        });
        updateNavActive();
      }

      function updateNavActive() {
        const buttons = els("#nav button");
        buttons.forEach((b, idx) => {
          b.classList.toggle("active", idx === state.currentIndex);
          b.classList.toggle("done", state.answers[idx] !== null);
        });
        el("#infoSoal").textContent = `Soal ${state.currentIndex + 1} / ${
          QUESTIONS.length
        }`;
        el("#infoKategori").textContent = `Kategori: ${QUESTIONS[
          state.currentIndex
        ].type.toUpperCase()}`;
      }

      function renderQuestion() {
        const q = QUESTIONS[state.currentIndex];
        const container = el("#questionArea");
        container.innerHTML = "";
        const title = document.createElement("div");
        title.className = "q-title";

        title.innerHTML = q.q;
        container.appendChild(title);

        const list = document.createElement("div");
        list.className = "choices";
        q.options.forEach((opt, i) => {
          const row = document.createElement("label");
          row.className = "choice";
          const input = document.createElement("input");
          input.type = "radio";
          input.name = "choice";
          input.value = i;
          input.checked = state.answers[state.currentIndex] === i;
          input.addEventListener("change", () => {
            state.answers[state.currentIndex] = i;
            updateNavActive();
          });
          const span = document.createElement("div");
          span.innerHTML = opt;
          row.appendChild(input);
          row.appendChild(span);
          list.appendChild(row);
        });
        container.appendChild(list);
        MathJax.typeset();
      }

      function goTo(idx) {
        state.currentIndex = Math.max(0, Math.min(QUESTIONS.length - 1, idx));
        updateNavActive();
        renderQuestion();
      }

      function next() {
        if (state.currentIndex < QUESTIONS.length - 1) {
          goTo(state.currentIndex + 1);
        }
      }
      function prev() {
        if (state.currentIndex > 0) {
          goTo(state.currentIndex - 1);
        }
      }

      function resetAnswers() {
        if (!confirm("Yakin reset semua jawaban?")) return;
        state.answers = Array(QUESTIONS.length).fill(null);
        updateNavActive();
        renderQuestion();
      }

      function submitQuiz() {
        // hitung skor per kategori
        let sSin = 0,
          sAnt = 0,
          sHip = 0;
        QUESTIONS.forEach((q, idx) => {
          const pick = state.answers[idx];
          const correct = q.answer;
          if (pick === correct) {
            if (q.type === "TWK 4 Pilar") sSin++;
          }
        });
        const total = sSin + sAnt + sHip;

        // tampilkan
        let total_question = QUESTIONS.length;

        el("#scoreTotal").textContent = `${total} / ${total_question}`;
        el("#resultUser").textContent = `Peserta: ${
          state.user?.nama || "-"
        } (waktu habis/kumpul)`;

        // stop timer, ganti section
        if (tick) clearInterval(tick);
        showSection("result");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showSection(which) {
        el("#section-form").classList.remove("active");
        el("#section-quiz").classList.remove("active");
        el("#section-result").classList.remove("active");
        if (which === "form") el("#section-form").classList.add("active");
        if (which === "quiz") el("#section-quiz").classList.add("active");
        if (which === "result") el("#section-result").classList.add("active");
      }

      // EVENTS
      el("#btnMulai").addEventListener("click", () => {
        const nama = el("#nama").value.trim();
        const pass = el("#pass").value.trim();
        if (!nama || !pass) {
          alert("Nama dan password wajib diisi.");
          return;
        }
        if (pass !== "PANCASILA") {
          alert(
            "password salah! tanya password ke sir hardi. klo sir hardi dak tau tanya ke sir meca",
          );
          return;
        }
        state.user = { nama, pass };
        el("#infoUser").textContent = `Peserta: ${nama}`;
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });

      el("#prevBtn").addEventListener("click", prev);
      el("#nextBtn").addEventListener("click", next);
      el("#btnReset").addEventListener("click", resetAnswers);
      el("#btnSubmit").addEventListener("click", () => {
        if (confirm("Kumpulkan jawaban sekarang?")) submitQuiz();
      });

      // Keyboard nav: panah kiri/kanan, angka 1-4 untuk memilih A-D
      window.addEventListener("keydown", (e) => {
        if (!el("#section-quiz").classList.contains("active")) return;
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
        if (["1", "2", "3", "4"].includes(e.key)) {
          const idx = parseInt(e.key) - 1;
          state.answers[state.currentIndex] = idx;
          updateNavActive();
          renderQuestion();
        }
      });

      // Ulang dari hasil
      el("#btnUlang").addEventListener("click", () => {
        state = {
          user: state.user,
          timeLeft: 20 * 60,
          currentIndex: 0,
          answers: Array(180).fill(null),
        };
        QUESTIONS = shuffle(QUESTIONS); // acak ulang urutan
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });
    </script>
  </body>
</html>
