<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kuis Tata Bahasa Indonesia</title>
    <style>
      :root {
        --primary: #4a6fa5;
        --secondary: #16a085;
        --bg: #f5f7fa;
        --text: #333;
        --card-bg: #ffffff;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .container {
        background: var(--card-bg);
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        max-width: 600px;
        width: 100%;
        box-sizing: border-box;
      }
      .screen {
        display: none;
      }
      .active {
        display: block;
      }
      h1,
      h2 {
        text-align: center;
        color: var(--primary);
      }
      button {
        display: block;
        width: 100%;
        background-color: var(--primary);
        color: white;
        border: none;
        padding: 12px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 20px;
        transition: 0.3s;
      }
      button:hover {
        background-color: #3b5984;
      }
      .option-btn {
        background-color: #f0f4f8;
        color: var(--text);
        text-align: left;
        margin-bottom: 10px;
        border: 1px solid #dcdcdc;
      }
      .option-btn:hover {
        background-color: #e2e8f0;
      }
      .progress {
        font-size: 14px;
        color: #666;
        margin-bottom: 15px;
      }
      .review-item {
        border-bottom: 1px solid #eee;
        padding: 15px 0;
      }
      .correct {
        color: #27ae60;
        font-weight: bold;
      }
      .incorrect {
        color: #c0392b;
        font-weight: bold;
      }
      .explanation {
        background: #f9f9f9;
        padding: 10px;
        border-left: 4px solid var(--primary);
        margin-top: 5px;
        font-size: 14px;
      }
      .stat-box {
        display: flex;
        justify-content: space-around;
        margin: 20px 0;
        background: #f0f4f8;
        padding: 15px;
        border-radius: 8px;
      }
      .stat-item {
        text-align: center;
      }
      .stat-num {
        font-size: 24px;
        font-weight: bold;
        color: var(--primary);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- 1. HALAMAN DEPAN -->
      <div id="home-screen" class="screen active">
        <h1>Uji Tata Bahasa Indonesia</h1>
        <p style="text-align: center">
          Uji kemampuanmu dalam mendeteksi kalimat yang tidak baku atau salah
          menurut tata bahasa Indonesia.
        </p>
        <button onclick="startQuiz()">Mulai Kuis</button>
      </div>

      <!-- 2. HALAMAN SOAL -->
      <div id="quiz-screen" class="screen">
        <div class="progress">
          Soal <span id="current-question-num">1</span> dari
          <span id="total-questions-num">5</span>
        </div>
        <h3 id="question-text">
          Manakah berikut ini kalimat yang tidak benar?
        </h3>
        <div id="options-container">
          <!-- Pilihan jawaban akan digenerate via JS -->
        </div>
      </div>

      <!-- 3. HALAMAN AKHIR -->
      <div id="result-screen" class="screen">
        <h2>Hasil Kuis</h2>
        <div class="stat-box">
          <div class="stat-item">
            <div class="stat-num" id="res-skor">0</div>
            <div>Skor</div>
          </div>
          <div class="stat-item">
            <div class="stat-num" id="res-akurasi">0%</div>
            <div>Akurasi</div>
          </div>
        </div>

        <h3>Pembahasan:</h3>
        <div id="review-container">
          <!-- Detail pembahasan akan digenerate via JS -->
        </div>
        <button onclick="resetQuiz()">Coba Lagi</button>
      </div>
    </div>

      let totalSoal = 15; // Jumlah soal per sesi kuis
      let kuisData = [];
      let currentIndex = 0;
      let skor = 0;
      let riwayatUser = [];

      function startQuiz() {
        skor = 0;
        currentIndex = 0;
        riwayatUser = [];

        // Acak bank kalimat dan ambil sebanyak totalSoal
        let diacak = [...bankKalimat].sort(() => 0.5 - Math.random());
        kuisData = diacak.slice(0, totalSoal);

        switchScreen("quiz-screen");
        tampilkanSoal();
      }

      function tampilkanSoal() {
        if (currentIndex >= kuisData.length) {
          tampilkanHasil();
          return;
        }

        document.getElementById("current-question-num").innerText =
          currentIndex + 1;
        document.getElementById("total-questions-num").innerText =
          kuisData.length;

        const soalSaatIni = kuisData[currentIndex];

        // ALGORITMA: Mengambil 4 kalimat BENAR dari bank kalimat lain secara acak sebagai pengecoh
        let bankBenarLain = bankKalimat
          .filter((item) => item.benar !== soalSaatIni.benar)
          .map((item) => item.benar);

        // Acak kalimat benar lainnya dan ambil 4
        bankBenarLain.sort(() => 0.5 - Math.random());
        let pilihanBenar = bankBenarLain.slice(0, 4);

        // Gabungkan 1 kalimat SALAH (kunci) dengan 4 kalimat BENAR
        let semuaPilihan = [
          { teks: soalSaatIni.salah, benar: false }, // Ini yang dicari (kalimat tidak benar)
          { teks: pilihanBenar[0], benar: true },
          { teks: pilihanBenar[1], benar: true },
          { teks: pilihanBenar[2], benar: true },
          { teks: pilihanBenar[3], benar: true },
        ];

        // Acak urutan tampil pilihan jawaban agar dinamis
        semuaPilihan.sort(() => 0.5 - Math.random());

        // Tampilkan ke HTML
        const optionsContainer = document.getElementById("options-container");
        optionsContainer.innerHTML = "";

        semuaPilihan.forEach((pilihan) => {
          const btn = document.createElement("button");
          btn.className = "option-btn";
          btn.innerHTML = pilihan.teks;
          // Jika diklik, jalankan fungsi cek jawaban
          btn.onclick = () =>
            jawabSoal(pilihan.teks, soalSaatIni.salah, soalSaatIni);
          optionsContainer.appendChild(btn);
        });
      }

      function jawabSoal(pilihanTeks, kunciSalah, dataAsli) {
        // Karena pertanyaannya "Manakah yang tidak benar?", user benar jika memilih kalimat yang 'salah'
        const isCorrect = pilihanTeks === kunciSalah;
        if (isCorrect) {
          skor += 20; // 5 soal x 20 = 100
        }

        riwayatUser.push({
          soalKe: currentIndex + 1,
          pilihanUser: pilihanTeks,
          kunciJawaban: kunciSalah,
          isCorrect: isCorrect,
          penjelasan: dataAsli.penjelasan,
        });

        currentIndex++;
        tampilkanSoal();
      }

      function tampilkanHasil() {
        switchScreen("result-screen");

        document.getElementById("res-skor").innerText = skor;
        document.getElementById("res-akurasi").innerText =
          (skor / 100) * 100 + "%";

        const reviewContainer = document.getElementById("review-container");
        reviewContainer.innerHTML = "";

        riwayatUser.forEach((item) => {
          const div = document.createElement("div");
          div.className = "review-item";

          div.innerHTML = `
                  <p><strong>Soal ${item.soalKe}:</strong></p>
                  <p>Pilihan Kamu: <span class="${item.isCorrect ? "correct" : "incorrect"}">${item.pilihanUser}</span></p>
                  ${!item.isCorrect ? `<p>Kunci Jawaban (Kalimat Salah): <span class="correct">${item.kunciJawaban}</span></p>` : ""}
                  <div class="explanation">
                      <strong>Pembahasan:</strong> Kalimat tersebut salah karena ${item.penjelasan.toLowerCase()}
                  </div>
              `;
          reviewContainer.appendChild(div);
        });
      }

      function resetQuiz() {
        switchScreen("home-screen");
      }

      function switchScreen(screenId) {
        document.querySelectorAll(".screen").forEach((screen) => {
          screen.classList.remove("active");
        });
        document.getElementById(screenId).classList.add("active");
      }
