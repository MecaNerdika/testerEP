<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiu Campuran 1</title>
    <style>
      :root {
        --bg: #060000; /* slate-900 */
        --card: #111827; /* gray-900 */
        --muted: #334155; /* slate-600 */
        --text: #ffffff; /* gray-200 */
        --accent: #38bdf8; /* sky-400 */
        --accent-2: #22c55e; /* green-500 */
        --danger: #ef4444; /* red-500 */
        --warn: #f59e0b; /* amber-500 */
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        background:
          radial-gradient(1200px 800px at 10% -10%, #1e293b, transparent),
          radial-gradient(800px 600px at 120% 0%, #0b3b47, transparent),
          var(--bg);
        color: var(--text);
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .app {
        width: 100%;
        max-width: 980px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: 0.5px;
        font-size: clamp(18px, 3.5vw, 24px);
      }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        padding: 10px 14px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #1f2a44;
        box-shadow: var(--shadow);
      }
      .card {
        background: linear-gradient(180deg, #0b1220, #0a1020);
        border: 1px solid #1f2a44;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .section {
        display: none;
      }
      .active {
        display: block;
      }
      .card-inner {
        padding: 20px;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }
      .grid-responsive {
        grid-template-columns: 1fr;
      }
      @media (min-width: 720px) {
        .grid-responsive {
          grid-template-columns: 1fr 320px;
        }
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #26314d;
        background: #0b1220;
        color: var(--text);
        outline: none;
        box-shadow: inset 0 0 0 9999px rgba(255, 255, 255, 0);
      }
      label {
        font-size: 14px;
        color: #cbd5e1;
      }
      .btn {
        cursor: pointer;
        padding: 12px 16px;
        border-radius: 14px;
        background: var(--accent);
        color: #001219;
        border: none;
        font-weight: 700;
        box-shadow: var(--shadow);
        transition: 0.2s transform ease;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn.secondary {
        background: #1f2937;
        color: #e2e8f0;
        border: 1px solid #334155;
      }
      .btn.warn {
        background: var(--warn);
        color: #0b1220;
      }
      .btn.danger {
        background: var(--danger);
        color: #0b1220;
      }
      .muted {
        color: #94a3b8;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #223156;
        font-size: 12px;
        color: #cbd5e1;
      }

      .question-area {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .q-title {
        font-weight: 400;
        font-size: 16px;
      }
      .choices {
        display: grid;
        gap: 10px;
      }
      .choice {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        border: 1px solid #1f2a44;
        background: #0b1220;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
      }
      .choice input {
        margin-top: 4px;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        max-height: 240px;
        overflow: auto;
        padding: 10px;
      }
      .nav button {
        width: 44px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid #1f2a44;
        background: #0b1220;
        color: #cbd5e1;
        font-weight: 700;
        cursor: pointer;
      }
      .nav button.active {
        outline: 2px solid var(--accent);
        color: #0ea5e9;
      }
      .nav button.done {
        background: #07291f;
        border-color: #0b7a53;
        color: #34d399;
      }

      .footer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 10px;
      }

      .legend {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .results {
        display: grid;
        gap: 12px;
      }
      .score-box {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .score-card {
        background: #0b1220;
        border: 1px solid #1f2a44;
        border-radius: 14px;
        padding: 14px;
      }

      .info-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">Tiu Campuran</div>
        <div class="pill" id="infoUser">Belum login</div>
        <div class="timer" id="timer">15:00</div>
      </header>

      <!-- SECTION 1: FORM MINIMAL -->
      <section id="section-form" class="section active">
        <div class="card">
          <div class="card-inner grid">
            <div>
              <h2 style="margin: 0 0 10px 0">Masuk Kuis</h2>
              <p class="muted" style="margin-top: 0">
                Masukkan nama dan password untuk memulai. Tidak ada pengaturan
                tambahan.
              </p>
              <div class="grid">
                <div>
                  <label for="nama">Nama</label>
                  <input id="nama" type="text" placeholder="Nama peserta" />
                </div>
                <div>
                  <label for="pass">Password</label>
                  <input id="pass" type="password" placeholder="Password" />
                </div>
                <button class="btn" id="btnMulai">Mulai Kuis</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 2: QUIZ -->
      <section id="section-quiz" class="section">
        <div class="grid grid-responsive">
          <div class="card">
            <div class="card-inner">
              <div class="info-row">
                <div class="pill" id="infoKategori">Kategori: -</div>
                <div class="pill" id="infoSoal">Soal 0 / 180</div>
              </div>
              <div class="question-area" id="questionArea">
                <!-- Question inject here -->
              </div>
              <div class="footer-actions">
                <button class="btn secondary" id="prevBtn">Prev</button>
                <div class="legend">
                  <span class="pill">• Biru = aktif</span>
                  <span
                    class="pill"
                    style="
                      background: #07291f;
                      color: #34d399;
                      border-color: #0b7a53;
                    "
                    >• Hijau = terjawab</span
                  >
                </div>
                <button class="btn" id="nextBtn">Next</button>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <h3 style="margin-top: 0">Navigasi Soal</h3>
              <div class="nav" id="nav">
                <!-- Nav buttons injected here -->
              </div>
              <div class="grid" style="margin-top: 8px">
                <button class="btn warn" id="btnSubmit">
                  Kumpulkan Jawaban
                </button>
                <button class="btn danger" id="btnReset">Reset Jawaban</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 3: HASIL -->
      <section id="section-result" class="section">
        <div class="card">
          <div class="card-inner results">
            <h2 style="margin: 0">Hasil Ujian</h2>
            <p class="muted" id="resultUser">Peserta: -</p>
            <div class="score-box">
              <div class="score-card" style="grid-column: span 2">
                <div class="muted">Total Skor</div>
                <div id="scoreTotal" style="font-size: 30px; font-weight: 900">
                  0 / 180
                </div>
              </div>
            </div>
            <div>
              <button class="btn" id="btnUlang">Mulai Lagi</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      /** UTIL **/
      const el = (sel) => document.querySelector(sel);
      const els = (sel) => Array.from(document.querySelectorAll(sel));
      const shuffle = (arr) =>
        arr
          .map((v) => [Math.random(), v])
          .sort((a, b) => a[0] - b[0])
          .map((x) => x[1]);

      /** BANK SOAL (40/40/40) **/
      // Format: {type:'sinonim'|'antonim'|'hiponim', q:'', options:['','','',''], answer: index}

      const SOAL_fungsi = [
        // === 1. POLA KALIMAT (2 SOAL) ===
        {
          q: "Kalimat: 'Manager keuangan perusahaan itu menginvestasikan laba bersih ke instrumen obligasi negara kemarin pagi.'<br><br>Kalimat yang memiliki pola yang sama dengan kalimat di atas adalah...",
          o: [
            "Adik menangis tersedu-sedu di dalam kamar tidur.",
            "Gubernur baru meresmikan jembatan gantung itu dengan meriah.",
            "Dokter spesialis anak itu memberikan resep obat kepada orang tua pasien tadi siang.",
            "Mereka membicarakan rencana liburan akhir tahun di kafetaria.",
            "Polisi menangkap komplotan pencuri motor secara mendadak.",
          ],
          a: 2,
        },
        {
          q: "Kalimat: 'Burung elang itu terbang dengan sangat cepat di atas langit biru.'<br><br>Kalimat yang memiliki pola yang sama dengan kalimat di atas adalah...",
          o: [
            "Karyawan magang itu bekerja dengan giat di ruang produksi.",
            "Ibu memotong sayur dengan pisau tajam di dapur.",
            "Ayah membelikan kakak sepeda lipat baru minggu lalu.",
            "Pertunjukan seni itu berjalan sangat sukses kemarin malam.",
            "Pemerintah menyalurkan bantuan sosial secara merata.",
          ],
          a: 0,
        },

        // === 2. ANALOGI (2 SOAL) ===
        {
          q: "STETOSKOP : DOKTER = ... : ...",
          o: [
            "Cangkul : Petani",
            "Pasien : Obat",
            "Penghapus : Papan Tulis",
            "Montir : Obeng",
            "Buku : Guru",
          ],
          a: 0,
        },
        {
          q: "LAPAR : MAKAN : KENYANG = ... : ... : ...",
          o: [
            "Mengantuk : Kopi : Segar",
            "Lelah : Tidur : Bugar",
            "Sakit : Dokter : Sembuh",
            "Bosan : Hiburan : Senang",
            "Gelap : Lampu : Terang",
          ],
          a: 1,
        },

        // === 3. SILOGISME & LOGIKA (5 SOAL) ===
        {
          q: "Jika kinerja karyawan meningkat, maka profit perusahaan akan naik. Jika profit perusahaan naik, maka bonus tahunan akan dibagikan. Hari ini bonus tahunan tidak dibagikan.<br><br>Kesimpulan yang sah adalah...",
          o: [
            "Profit perusahaan tetap naik namun tidak ada bonus.",
            "Kinerja karyawan tidak meningkat.",
            "Kinerja karyawan meningkat tetapi profit perusahaan turun.",
            "Bonus tahunan ditunda karena profit perusahaan menurun.",
            "Karyawan mogok kerja karena tidak mendapat bonus.",
          ],
          a: 1,
        },
        {
          q: "Jika harga bahan bakar minyak naik \\( (p) \\), maka ongkos transportasi publik akan meningkat \\( (q) \\). Jika ongkos transportasi publik meningkat \\( (q) \\), maka daya beli masyarakat akan menurun \\( (r) \\).<br><br>Kesimpulan yang setara/ekuivalen dengan pernyataan di atas adalah...",
          o: [
            "Harga bahan bakar minyak naik dan daya beli masyarakat menurun.",
            "Jika harga bahan bakar minyak tidak naik, maka daya beli masyarakat tidak menurun.",
            "Harga bahan bakar minyak tidak naik atau daya beli masyarakat menurun.",
            "Daya beli masyarakat menurun atau harga bahan bakar minyak naik.",
            "Jika ongkos transportasi publik tidak meningkat, maka harga bahan bakar minyak tidak naik.",
          ],
          a: 2,
        },
        {
          q: "Semua mahasiswa tingkat akhir wajib menyusun skripsi. Sebagian mahasiswa tingkat akhir adalah atlet daerah.<br><br>Kesimpulan yang paling tepat adalah...",
          o: [
            "Semua atlet daerah wajib menyusun skripsi.",
            "Sebagian atlet daerah yang wajib menyusun skripsi bukan mahasiswa tingkat akhir.",
            "Sebagian mahasiswa tingkat akhir yang wajib menyusun skripsi adalah atlet daerah.",
            "Semua mahasiswa tingkat akhir yang menyusun skripsi bukan atlet daerah.",
            "Sebagian atlet daerah tidak wajib menyusun skripsi.",
          ],
          a: 2,
        },
        {
          q: "Semua pegawai negeri menerima tunjangan kinerja. Sebagian orang yang menerima tunjangan kinerja memiliki investasi properti.<br><br>Kesimpulan yang paling tepat adalah...",
          o: [
            "Semua pegawai negeri memiliki investasi properti.",
            "Sebagian pegawai negeri memiliki investasi properti.",
            "Sebagian orang yang memiliki investasi properti adalah pegawai negeri.",
            "Semua orang yang memiliki investasi properti adalah pegawai negeri.",
            "Tidak dapat ditarik kesimpulan yang pasti mengenai hubungan pegawai negeri dan investasi properti.",
          ],
          a: 4,
        },
        {
          q: "Jika sebuah wilayah mengalami kekeringan ekstrem, maka persediaan air bersih di wilayah tersebut akan menipis. Wilayah Z tidak mengalami kekeringan ekstrem.<br><br>Kesimpulan yang tepat adalah...",
          o: [
            "Persediaan air bersih di wilayah Z tidak menipis.",
            "Persediaan air bersih di wilayah Z melimpah ruah.",
            "Wilayah Z sedang mengalami musim hujan deras.",
            "Tidak ada kesimpulan yang sah.",
            "Persediaan air bersih di wilayah Z menipis karena faktor lain.",
          ],
          a: 3,
        },

        // === 4. OPERASI CAMPURAN PECAHAN (4 SOAL) ===
        {
          q: "Hasil dari \\( 1\\frac{3}{4} \\times 0,6 + 45\\% : \\frac{9}{20} \\) adalah...",
          o: ["1,85", "2,05", "2,25", "2,45", "2,65"],
          a: 1,
        },
        {
          q: "Nilai dari \\( \\frac{4}{5} - \\left( \\frac{1}{4} + 0,15 \\right) \\times 1\\frac{1}{2} \\) adalah...",
          o: ["0,20", "0,25", "0,30", "0,35", "0,40"],
          a: 0,
        },
        {
          q: "Jika \\( A = \\frac{2}{3} \\) dari \\( 45\\% \\) dan \\( B = 0,60 : 2\\frac{1}{2} \\), maka hubungan perbandingan yang tepat antara \\( A \\) dan \\( B \\) adalah...",
          o: [
            "\\( A = B \\)",
            "\\( A > B \\)",
            "\\( A < B \\)",
            "\\( A = 2B \\)",
            "Hubungan tidak dapat ditentukan",
          ],
          a: 1,
        },
        {
          q: "Hasil dari \\( \\frac{0,625 : 0,25}{0,4 \\times 0,5} \\times \\frac{2}{5} \\) adalah...",
          o: ["2,5", "3,0", "4,0", "5,0", "6,0"],
          a: 3,
        },

        // === 5. PENALARAN ANALITIK (1 SOAL) ===
        {
          q: "Enam buah produk (P, Q, R, S, T, U) dipajang berurutan di sebuah etalase dari nomor 1 hingga 6 (kiri ke kanan).<br>1. Produk P berada di ujung paling kanan.<br>2. Produk R diletakkan tepat di antara Q dan S.<br>3. Produk T tidak boleh diletakkan di sebelah U maupun P.<br>4. Produk S berada tepat di sebelah kiri produk U.<br><br>Produk apakah yang berada di posisi nomor 2 dari kiri?",
          o: ["Q", "R", "S", "T", "U"],
          a: 0,
        },

        // === 6. DERET ANGKA (4 SOAL) ===
        {
          q: "\\( 19, 23, 29, 31, 37, 41, 43, ... \\)",
          o: ["45", "47", "49", "51", "53"],
          a: 1,
        },
        {
          q: "\\( 4, 4, 8, 12, 20, 32, 52, ... \\)",
          o: ["74", "80", "84", "92", "104"],
          a: 2,
        },
        {
          q: "\\( 5, 7, 11, 17, 25, 35, ... \\)",
          o: ["45", "47", "49", "51", "53"],
          a: 1,
        },
        {
          q: "\\( 2, 3, 7, 16, 32, 57, 93, ... \\)",
          o: ["128", "134", "142", "144", "156"],
          a: 2,
        },

        // === 7. JARAK, KECEPATAN, & WAKTU (3 SOAL) ===
        {
          q: "Kota C dan Kota D berjarak \\( 210  km \\). Fahri berkendara dari Kota C menuju Kota D dengan kecepatan rata-rata \\( 55  km/jam \\). Pada saat yang sama, Galih berkendara dari Kota D menuju Kota C dengan kecepatan rata-rata \\( 50  km/jam \\). Jika mereka berangkat pukul 07.30, pukul berapakah mereka akan berpapasan?",
          o: ["09.00", "09.15", "09.30", "09.45", "10.00"],
          a: 2,
        },
        {
          q: "Hendra berangkat dari kota A menuju kota B pukul 08.00 dengan kecepatan \\( 50  km/jam \\). Pada pukul 08.15, Iwan berangkat dari kota B menuju kota A dengan kecepatan \\( 60 km/jam \\). Jika jarak total kedua kota adalah \\( 125 km \\), mereka akan berpapasan pada pukul...",
          o: ["09.15", "09.20", "09.30", "09.45", "10.00"],
          a: 1,
        },
        {
          q: "Kevin bersepeda dengan kecepatan \\( 20  km/jam \\). Setelah menempuh waktu 45 menit, Rama menyusul dari tempat yang sama menggunakan sepeda motor dengan kecepatan \\( 50  km/jam \\). Waktu yang dibutuhkan Rama untuk menyusul Kevin adalah...",
          o: ["20 menit", "25 menit", "30 menit", "35 menit", "40 menit"],
          a: 2,
        },

        // === 8. PERBANDINGAN (4 SOAL) ===
        {
          q: "Sebuah laporan keuangan dapat diselesaikan oleh Irma sendirian dalam waktu 6 jam, sedangkan jika dikerjakan oleh Jodi sendirian selesai dalam waktu 3 jam. Jika mereka bekerja bersama-sama, laporan tersebut akan selesai dalam waktu...",
          o: ["1 jam", "1,5 jam", "2 jam", "2,5 jam", "4 jam"],
          a: 2,
        },
        {
          q: "Jika 4 orang penjahit dapat menyelesaikan 12 gaun dalam waktu 6 hari, berapakah jumlah gaun yang dapat diselesaikan oleh 6 orang penjahit dalam waktu 8 hari?",
          o: ["18 gaun", "20 gaun", "22 gaun", "24 gaun", "26 gaun"],
          a: 3,
        },
        {
          q: "Sebuah proyek pengaspalan jalan direncanakan selesai dalam waktu 24 hari oleh 15 orang pekerja. Setelah bekerja selama 8 hari, proyek dihentikan selama 6 hari karena kendala alat berat. Agar proyek dapat selesai tepat pada waktu yang direncanakan, jumlah pekerja tambahan yang dibutuhkan adalah...",
          o: ["6 orang", "9 orang", "10 orang", "12 orang", "15 orang"],
          a: 1,
        },
        {
          q: "Suatu pekerjaan pembuatan parit dapat diselesaikan oleh 12 orang dalam waktu 20 hari. Setelah pekerjaan berjalan selama 5 hari, 3 orang pekerja jatuh sakit dan tidak dapat melanjutkan pekerjaan. Berapakah total waktu dari awal hingga parit selesai dibuat?",
          o: ["22 hari", "23 hari", "24 hari", "25 hari", "26 hari"],
          a: 3,
        },
      ].map((x) => ({
        type: "Tiu Campuran",
        q: x.q,
        options: x.o,
        answer: x.a,
      }));

      S_fungsi = shuffle(SOAL_fungsi);

      function shuffleOptions(q) {
        let opts = q.options.map((opt, i) => ({ opt, i }));
        opts = shuffle(opts); // pake fungsi shuffle yang sudah kamu punya
        let newAnswer = opts.findIndex((o) => o.i === q.answer);
        return {
          ...q,
          options: opts.map((o) => o.opt),
          answer: newAnswer,
        };
      }
      //*/
      let QUESTIONS = [...S_fungsi].map((q, i) => ({
        id: i + 1,
        ...shuffleOptions(q),
      }));
      // let QUESTIONS = [...SINONIM, ...ANTONIM].map((q,i)=>({id:i+1, ...q }));
      // State
      let state = {
        user: null,
        timeLeft: 35 * 60, // 25 menit
        currentIndex: 0,
        answers: Array(180).fill(null), // simpan index jawaban (0..3) atau null
      };

      /** RENDERING **/
      function formatTime(s) {
        const m = Math.floor(s / 60)
          .toString()
          .padStart(2, "0");
        const r = (s % 60).toString().padStart(2, "0");
        return `${m}:${r}`;
      }

      function renderTimer() {
        el("#timer").textContent = formatTime(state.timeLeft);
        if (state.timeLeft <= 60) {
          el("#timer").style.background = "#331a1a";
          el("#timer").style.borderColor = "#7f1d1d";
        }
        if (state.timeLeft <= 0) {
          submitQuiz();
        }
      }

      let tick = null;
      function startTimer() {
        if (tick) clearInterval(tick);
        const waktuTarget = Date.now() + state.timeLeft * 1000;
        tick = setInterval(() => {
          const waktuSekarang = Date.now();

          state.timeLeft = Math.ceil((waktuTarget - waktuSekarang) / 1000);

          if (state.timeLeft > 0) {
            renderTimer();
          } else {
            state.timeLeft = 0;
            renderTimer();
            clearInterval(tick);
          }
        }, 200);
      }

      function mountNav() {
        const nav = el("#nav");
        nav.innerHTML = "";
        QUESTIONS.forEach((q, idx) => {
          const b = document.createElement("button");
          b.textContent = idx + 1;
          b.addEventListener("click", () => {
            goTo(idx);
          });
          nav.appendChild(b);
        });
        updateNavActive();
      }

      function updateNavActive() {
        const buttons = els("#nav button");
        buttons.forEach((b, idx) => {
          b.classList.toggle("active", idx === state.currentIndex);
          b.classList.toggle("done", state.answers[idx] !== null);
        });
        el("#infoSoal").textContent = `Soal ${state.currentIndex + 1} / ${
          QUESTIONS.length
        }`;
        el("#infoKategori").textContent = `Kategori: ${QUESTIONS[
          state.currentIndex
        ].type.toUpperCase()}`;
      }

      function renderQuestion() {
        const q = QUESTIONS[state.currentIndex];
        const container = el("#questionArea");
        container.innerHTML = "";
        const title = document.createElement("div");
        title.className = "q-title";

        title.innerHTML = q.q;
        container.appendChild(title);

        const list = document.createElement("div");
        list.className = "choices";
        q.options.forEach((opt, i) => {
          const row = document.createElement("label");
          row.className = "choice";
          const input = document.createElement("input");
          input.type = "radio";
          input.name = "choice";
          input.value = i;
          input.checked = state.answers[state.currentIndex] === i;
          input.addEventListener("change", () => {
            state.answers[state.currentIndex] = i;
            updateNavActive();
          });
          const span = document.createElement("div");
          span.innerHTML = opt;
          row.appendChild(input);
          row.appendChild(span);
          list.appendChild(row);
        });
        container.appendChild(list);
        MathJax.typeset();
      }

      function goTo(idx) {
        state.currentIndex = Math.max(0, Math.min(QUESTIONS.length - 1, idx));
        updateNavActive();
        renderQuestion();
      }

      function next() {
        if (state.currentIndex < QUESTIONS.length - 1) {
          goTo(state.currentIndex + 1);
        }
      }
      function prev() {
        if (state.currentIndex > 0) {
          goTo(state.currentIndex - 1);
        }
      }

      function resetAnswers() {
        if (!confirm("Yakin reset semua jawaban?")) return;
        state.answers = Array(QUESTIONS.length).fill(null);
        updateNavActive();
        renderQuestion();
      }

      function submitQuiz() {
        // hitung skor per kategori
        let score = 0;
        QUESTIONS.forEach((q, idx) => {
          const pick = state.answers[idx];
          const correct = q.answer;
          if (pick === correct) {
            score++;
          }
        });
        const total = score;

        // tampilkan
        let total_question = QUESTIONS.length;

        el("#scoreTotal").textContent = `${total} / ${total_question}`;
        el("#resultUser").textContent = `Peserta: ${
          state.user?.nama || "-"
        } (waktu habis/kumpul)`;

        // stop timer, ganti section
        if (tick) clearInterval(tick);
        showSection("result");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showSection(which) {
        el("#section-form").classList.remove("active");
        el("#section-quiz").classList.remove("active");
        el("#section-result").classList.remove("active");
        if (which === "form") el("#section-form").classList.add("active");
        if (which === "quiz") el("#section-quiz").classList.add("active");
        if (which === "result") el("#section-result").classList.add("active");
      }

      // EVENTS
      el("#btnMulai").addEventListener("click", () => {
        const nama = el("#nama").value.trim();
        const pass = el("#pass").value.trim();
        if (!nama || !pass) {
          alert("Nama dan password wajib diisi.");
          return;
        }
        if (pass !== "RPG7") {
          alert(
            "password salah! tanya password ke sir hardi. klo sir hardi dak tau tanya ke sir meca",
          );
          return;
        }
        state.user = { nama, pass };
        el("#infoUser").textContent = `Peserta: ${nama}`;
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });

      el("#prevBtn").addEventListener("click", prev);
      el("#nextBtn").addEventListener("click", next);
      el("#btnReset").addEventListener("click", resetAnswers);
      el("#btnSubmit").addEventListener("click", () => {
        if (confirm("BENIAN BAE KAU NIH CEK LAGI JAWABAN KAU TUH!"))
          submitQuiz();
      });

      // Keyboard nav: panah kiri/kanan, angka 1-4 untuk memilih A-D
      window.addEventListener("keydown", (e) => {
        if (!el("#section-quiz").classList.contains("active")) return;
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
        if (["1", "2", "3", "4"].includes(e.key)) {
          const idx = parseInt(e.key) - 1;
          state.answers[state.currentIndex] = idx;
          updateNavActive();
          renderQuestion();
        }
      });

      // Ulang dari hasil
      el("#btnUlang").addEventListener("click", () => {
        state = {
          user: state.user,
          timeLeft: 5 * 60,
          currentIndex: 0,
          answers: Array(180).fill(null),
        };
        QUESTIONS = shuffle(QUESTIONS); // acak ulang urutan
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });
    </script>
  </body>
</html>
