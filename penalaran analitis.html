<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penalaran Analitis</title>
    <style>
      :root {
        --bg: #060000; /* slate-900 */
        --card: #111827; /* gray-900 */
        --muted: #334155; /* slate-600 */
        --text: #ffffff; /* gray-200 */
        --accent: #38bdf8; /* sky-400 */
        --accent-2: #22c55e; /* green-500 */
        --danger: #ef4444; /* red-500 */
        --warn: #f59e0b; /* amber-500 */
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        background:
          radial-gradient(1200px 800px at 10% -10%, #1e293b, transparent),
          radial-gradient(800px 600px at 120% 0%, #0b3b47, transparent),
          var(--bg);
        color: var(--text);
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .app {
        width: 100%;
        max-width: 980px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: 0.5px;
        font-size: clamp(18px, 3.5vw, 24px);
      }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        padding: 10px 14px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #1f2a44;
        box-shadow: var(--shadow);
      }
      .card {
        background: linear-gradient(180deg, #0b1220, #0a1020);
        border: 1px solid #1f2a44;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .section {
        display: none;
      }
      .active {
        display: block;
      }
      .card-inner {
        padding: 20px;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }
      .grid-responsive {
        grid-template-columns: 1fr;
      }
      @media (min-width: 720px) {
        .grid-responsive {
          grid-template-columns: 1fr 320px;
        }
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #26314d;
        background: #0b1220;
        color: var(--text);
        outline: none;
        box-shadow: inset 0 0 0 9999px rgba(255, 255, 255, 0);
      }
      label {
        font-size: 14px;
        color: #cbd5e1;
      }
      .btn {
        cursor: pointer;
        padding: 12px 16px;
        border-radius: 14px;
        background: var(--accent);
        color: #001219;
        border: none;
        font-weight: 700;
        box-shadow: var(--shadow);
        transition: 0.2s transform ease;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn.secondary {
        background: #1f2937;
        color: #e2e8f0;
        border: 1px solid #334155;
      }
      .btn.warn {
        background: var(--warn);
        color: #0b1220;
      }
      .btn.danger {
        background: var(--danger);
        color: #0b1220;
      }
      .muted {
        color: #94a3b8;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #223156;
        font-size: 12px;
        color: #cbd5e1;
      }

      .question-area {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .q-title {
        font-weight: 400;
        font-size: 15px;
      }
      .choices {
        display: grid;
        gap: 10px;
      }
      .choice {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        border: 1px solid #1f2a44;
        background: #0b1220;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
      }
      .choice input {
        margin-top: 4px;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        max-height: 240px;
        overflow: auto;
        padding: 10px;
      }
      .nav button {
        width: 44px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid #1f2a44;
        background: #0b1220;
        color: #cbd5e1;
        font-weight: 700;
        cursor: pointer;
      }
      .nav button.active {
        outline: 2px solid var(--accent);
        color: #0ea5e9;
      }
      .nav button.done {
        background: #07291f;
        border-color: #0b7a53;
        color: #34d399;
      }

      .footer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 10px;
      }

      .legend {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .results {
        display: grid;
        gap: 12px;
      }
      .score-box {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .score-card {
        background: #0b1220;
        border: 1px solid #1f2a44;
        border-radius: 14px;
        padding: 14px;
      }

      .info-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">Penalaran Analitis</div>
        <div class="pill" id="infoUser">Belum login</div>
        <div class="timer" id="timer">--:--</div>
      </header>

      <!-- SECTION 1: FORM MINIMAL -->
      <section id="section-form" class="section active">
        <div class="card">
          <div class="card-inner grid">
            <div>
              <h2 style="margin: 0 0 10px 0">Masuk Kuis</h2>
              <p class="muted" style="margin-top: 0">
                Masukkan nama dan password untuk memulai. Tidak ada pengaturan
                tambahan.
              </p>
              <div class="grid">
                <div>
                  <label for="nama">Nama</label>
                  <input id="nama" type="text" placeholder="Nama peserta" />
                </div>
                <div>
                  <label for="pass">Password</label>
                  <input id="pass" type="password" placeholder="Password" />
                </div>
                <button class="btn" id="btnMulai">Mulai Kuis</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 2: QUIZ -->
      <section id="section-quiz" class="section">
        <div class="grid grid-responsive">
          <div class="card">
            <div class="card-inner">
              <div class="info-row">
                <div class="pill" id="infoKategori">Kategori: -</div>
                <div class="pill" id="infoSoal">Soal 0 / 180</div>
              </div>
              <div class="question-area" id="questionArea">
                <!-- Question inject here -->
              </div>
              <div class="footer-actions">
                <button class="btn secondary" id="prevBtn">Prev</button>
                <div class="legend">
                  <span class="pill">• Biru = aktif</span>
                  <span
                    class="pill"
                    style="
                      background: #07291f;
                      color: #34d399;
                      border-color: #0b7a53;
                    "
                    >• Hijau = terjawab</span
                  >
                </div>
                <button class="btn" id="nextBtn">Next</button>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <h3 style="margin-top: 0">Navigasi Soal</h3>
              <div class="nav" id="nav">
                <!-- Nav buttons injected here -->
              </div>
              <div class="grid" style="margin-top: 8px">
                <button class="btn warn" id="btnSubmit">
                  Kumpulkan Jawaban
                </button>
                <button class="btn danger" id="btnReset">Reset Jawaban</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 3: HASIL -->
      <section id="section-result" class="section">
        <div class="card">
          <div class="card-inner results">
            <h2 style="margin: 0">Hasil Ujian</h2>
            <p class="muted" id="resultUser">Peserta: -</p>
            <div class="score-box">
              <div class="score-card" style="grid-column: span 2">
                <div class="muted">Total Skor</div>
                <div id="scoreTotal" style="font-size: 30px; font-weight: 900">
                  0 / 180
                </div>
              </div>
            </div>
            <div>
              <button class="btn" id="btnUlang">Mulai Lagi</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      /** UTIL **/
      const el = (sel) => document.querySelector(sel);
      const els = (sel) => Array.from(document.querySelectorAll(sel));
      const shuffle = (arr) =>
        arr
          .map((v) => [Math.random(), v])
          .sort((a, b) => a[0] - b[0])
          .map((x) => x[1]);

      /** BANK SOAL (40/40/40) **/
      // Format: {type:'sinonim'|'antonim'|'hiponim', q:'', options:['','','',''], answer: index}

      const SOAL_fungsi = [
        {
          q: "Dalam lomba lari 500 meter yang diikuti lima peserta (A, B, C, D, E), A berhasil menyalip B tepat sebelum garis finish namun posisi A tetap berada di belakang C. Jika E berhasil finis di urutan pertama dan D masuk garis finish tepat setelah C, siapakah yang berada di urutan keempat?",
          o: ["A", "B", "C", "D", "E"],
          a: 0,
        },
        {
          q: "Lima orang (K, L, M, N, O) duduk mengelilingi meja makan bundar. K duduk tepat di antara L dan M. Jika N duduk tepat di sebelah kanan M, siapakah yang duduk di antara L dan N?",
          o: ["K", "L", "M", "N", "O"],
          a: 4,
        },
        {
          q: "Enam tahapan seleksi (T1, T2, T3, T4, T5, T6) harus diikuti oleh peserta. T1 harus dilaksanakan sebelum T3, tetapi setelah T2. T4 dilaksanakan tepat setelah T3, sementara T6 selalu dilaksanakan pada tahap paling akhir. Jika T5 dilaksanakan tepat sebelum T2, manakah urutan pelaksanaan tes yang benar?",
          o: [
            "T5 - T2 - T1 - T3 - T4 - T6",
            "T2 - T5 - T1 - T3 - T4 - T6",
            "T5 - T1 - T2 - T3 - T4 - T6",
            "T1 - T2 - T3 - T4 - T5 - T6",
            "T5 - T2 - T3 - T1 - T4 - T6",
          ],
          a: 0,
        },
        {
          q: "Enam diplomat (A, B, C, D, E, F) mengadakan rapat meja bundar. A duduk berhadapan dengan F. B duduk di sebelah kanan A, di antara A dan C. Jika D duduk berhadapan dengan B, siapakah yang duduk tepat di sebelah kiri F?",
          o: ["A", "B", "C", "D", "E"],
          a: 2, // C
        },
        {
          q: "Enam unit mobil (P, Q, R, S, T, U) diparkir pada satu barisan sejajar. P diparkir di antara Q dan R. S diparkir di ujung paling kanan, sedangkan T diparkir tepat di sebelah kiri S. Jika Q diparkir tepat di sebelah kanan U, mobil manakah yang berada pada posisi ketiga dari kiri?",
          o: ["P", "Q", "R", "T", "U"],
          a: 0,
        },
        {
          q: "Delapan anggota dewan (A, B, C, D, E, F, G, H) duduk melingkar. A duduk berhadapan dengan E. B duduk dua kursi di sebelah kanan A. H duduk berhadapan dengan B. C duduk tepat di antara E dan H. Jika D duduk berhadapan dengan C, siapakah yang duduk di antara A dan B?",
          o: ["C", "D", "F", "G", "H"],
          a: 1,
        },
        {
          q: "Lima proyek (A, B, C, D, E) harus diselesaikan secara berurutan. Proyek A harus dikerjakan sebelum proyek B, tetapi setelah proyek C. Proyek D dikerjakan tepat setelah proyek E. Jika proyek A dikerjakan pada urutan keempat dan proyek C bukan merupakan proyek yang dikerjakan pada urutan pertama, proyek manakah yang dikerjakan pada urutan pertama?",
          o: ["A", "B", "C", "D", "E"],
          a: 4,
        },
        {
          q: "Enam orang (A, B, C, D, E, F) duduk mengelilingi meja bundar untuk rapat. A duduk berhadapan dengan D. C duduk tepat di antara A dan E. F duduk tepat di sebelah kanan D, sedangkan B duduk di antara F dan A. Siapakah yang duduk tepat di sebelah kiri E?",
          o: ["A", "B", "C", "D", "F"],
          a: 2,
        },
        {
          q: "Dalam hasil ujian seleksi, nilai P lebih tinggi dari nilai Q, tetapi lebih rendah dari nilai R. Nilai S tidak lebih rendah dari nilai R. Jika nilai T berada di antara nilai Q dan P, manakah urutan peserta dari yang memiliki nilai tertinggi hingga terendah?",
          o: [
            "S - R - P - T - Q",
            "R - S - P - T - Q",
            "S - R - T - P - Q",
            "P - R - S - T - Q",
            "S - P - R - T - Q",
          ],
          a: 0,
        },
        {
          q: "Delapan pimpinan rapat duduk mengelilingi meja bundar. Direktur duduk berhadapan dengan Sekretaris. Manajer duduk dua kursi di sebelah kanan Direktur, sedangkan Bendahara duduk tepat di seberang Manajer. Staf 1 duduk di antara Direktur dan Manajer, sementara Staf 2 duduk tepat di sebelah kanan Sekretaris. Jika Staf 3 duduk di antara Bendahara dan Sekretaris, di manakah posisi Staf 4?",
          o: [
            "Di antara Direktur dan Bendahara",
            "Di antara Manajer dan Sekretaris",
            "Tepat di sebelah kanan Sekretaris",
            "Berhadapan dengan Staf 1",
            "Tepat di sebelah kiri Bendahara",
          ],
          a: 0, // Di antara Direktur dan Bendahara
        },
        {
          q: "Enam orang (A, B, C, D, E, F) duduk mengelilingi meja bundar menghadap ke pusat meja.<br>- A duduk berhadapan dengan orang yang berada tepat di sebelah kiri B.<br>- D duduk tepat di seberang B.<br>- F duduk di antara D dan orang yang berada di sebelah kiri B.<br>- E duduk tepat di sebelah kanan B.<br><br>Siapakah yang duduk tepat di sebelah kanan A?",
          o: ["C", "D", "E", "F", "B"],
          a: 1,
        },
        {
          q: "Delapan orang (A, B, C, D, E, F, G, H) duduk mengelilingi meja bundar.<br>- A duduk berseberangan dengan E.<br>- B duduk berseberangan dengan H, di mana H dipisahkan oleh satu kursi dari E.<br>- C duduk tepat di antara E dan H.<br>- G duduk tepat di antara A dan H.<br>- D duduk tepat di sebelah kiri A.<br><br>Siapakah yang duduk tepat di berseberangan dengan D?",
          o: ["C", "F", "G", "H", "B"],
          a: 0,
        },
        {
          q: "Enam orang dengan profesi berbeda (Dokter, Guru, Pengacara, Arsitek, Akuntan, Polisi) duduk mengelilingi meja bundar.<br>- Dokter duduk tepat di antara Pengacara dan Arsitek.<br>- Polisi duduk tepat di seberang Dokter.<br>- Akuntan duduk tepat di sebelah kiri Polisi.<br>- Guru tidak duduk di samping Arsitek.<br><br>Profesi apakah yang berada tepat di antara Polisi dan Pengacara?",
          o: ["Guru", "Akuntan", "Arsitek", "Dokter", "Tidak dapat ditentukan"],
          a: 0,
        },
        {
          q: "Enam orang (P, Q, R, S, T, U) duduk melingkar dengan warna baju berbeda (Merah, Biru, Hijau, Kuning, Putih, Hitam).<br>- P (baju Merah) duduk berseberangan dengan R (baju Biru).<br>- Q (baju Hijau) duduk di antara P dan T (baju Kuning).<br>- Pemakai baju Hitam duduk tepat di seberang Q.<br>- Pemakai baju Putih tidak duduk di samping R.<br>- S duduk tepat di sebelah kanan P.<br><br>Baju warna apakah yang dipakai oleh orang yang duduk tepat di seberang S?",
          o: ["Kuning", "Hitam", "Hijau", "Putih", "Biru"],
          a: 0,
        },
        {
          q: "Delapan orang (A, B, C, D, E, F, G, H) duduk mengelilingi meja bundar.<br>- B duduk berseberangan dengan C.<br>- C duduk tepat di antara D dan E, di mana D berada di sebelah kanan C.<br>- A duduk dua kursi di sebelah kanan B.<br>- F duduk tepat berseberangan dengan A.<br>- G duduk tepat di sebelah kanan F.<br>- H mengisi posisi yang tersisa.<br><br>Siapakah yang duduk tepat di berseberangan dengan H?",
          o: ["E", "D", "C", "F", "G"],
          a: 0, // E
        },
        {
          q: "Enam diplomat dari negara berbeda (Inggris, Prancis, Jerman, Jepang, Cina, Indonesia) duduk mengelilingi meja bundar.<br>- Diplomat Inggris duduk tepat di seberang diplomat Prancis.<br>- Diplomat Jerman duduk tepat di antara diplomat Prancis dan diplomat Jepang.<br>- Diplomat Cina duduk tepat di sebelah kiri diplomat Inggris.<br>- Diplomat Indonesia tidak duduk di samping diplomat Prancis maupun diplomat Jepang.<br><br>Diplomat dari negara manakah yang duduk tepat di seberang diplomat Cina?",
          o: ["Jerman", "Indonesia", "Jepang", "Prancis", "Inggris"],
          a: 0, // Jerman
        },
        {
          q: "Enam orang (A, B, C, D, E, F) duduk mengelilingi meja bundar.<br>- D duduk tepat di sebelah kanan B.<br>- E duduk tepat di seberang B.<br>- F duduk tepat di antara C dan E.<br>- A tidak duduk di samping B ataupun C.<br><br>Siapakah yang duduk tepat di seberang A?",
          o: ["C", "F", "D", "B", "E"],
          a: 0,
        },
        {
          q: "Delapan peserta ujian (P1 sampai P8) duduk melingkar.<br>- P1 duduk berseberangan dengan P5.<br>- P3 duduk dua kursi di sebelah kiri P1.<br>- P7 duduk tepat di berseberangan dengan P3.<br>- P4 duduk berseberangan dengan P8.<br>- P6 duduk tepat di antara P5 dan P7.<br>- P2 duduk tepat di antara P1 dan P3.<br><br>Siapakah yang duduk tepat di berseberangan dengan P2?",
          o: ["P6", "P4", "P8", "P5", "P7"],
          a: 0,
        },
        {
          q: "Enam orang (A, B, C, D, E, F) duduk mengelilingi meja bundar.<br>- A duduk berseberangan dengan C.<br>- B tidak duduk di samping C.<br>- F duduk tepat di antara B dan C.<br>- D duduk tepat di antara C dan E.<br><br>Siapakah yang duduk tepat di antara A dan D?",
          o: ["E", "B", "F", "C", "Tidak ada"],
          a: 0,
        },
        {
          q: "Delapan anggota klub (A, B, C, D, E, F, G, H) duduk melingkar menghadap ke pusat meja.<br>- A duduk berseberangan dengan E.<br>- C duduk berseberangan dengan B, di mana B berada dua kursi di sebelah kanan A.<br>- D duduk tepat di antara C dan E.<br>- F duduk tepat di berseberangan dengan D.<br>- G tidak duduk di samping E.<br><br>Siapakah yang duduk tepat di sebelah kiri E?",
          o: ["H", "G", "F", "D", "C"],
          a: 3, // D (Diperbaiki dari 0 ke 3)
        },
      ].map((x) => ({
        type: "Penalaran",
        q: x.q,
        options: x.o,
        answer: x.a,
      }));

      S_fungsi = shuffle(SOAL_fungsi);

      /*  Validasi jumlah
                                  if(SINONIM.length!==90||ANTONIM.length!==90){
                                    console.warn('Jumlah soal tidak 90/90:', SINONIM.length, ANTONIM.length);
                                  }  */

      // /* Gabung & acak
      function shuffleOptions(q) {
        let opts = q.options.map((opt, i) => ({ opt, i }));
        opts = shuffle(opts); // pake fungsi shuffle yang sudah kamu punya
        let newAnswer = opts.findIndex((o) => o.i === q.answer);
        return {
          ...q,
          options: opts.map((o) => o.opt),
          answer: newAnswer,
        };
      }
      //*/
      let QUESTIONS = [...S_fungsi].map((q, i) => ({
        id: i + 1,
        ...shuffleOptions(q),
      }));
      // let QUESTIONS = [...SINONIM, ...ANTONIM].map((q,i)=>({id:i+1, ...q }));
      // State
      let state = {
        user: null,
        timeLeft: 30 * 60, // 25 menit
        currentIndex: 0,
        answers: Array(180).fill(null), // simpan index jawaban (0..3) atau null
      };

      /** RENDERING **/
      function formatTime(s) {
        const m = Math.floor(s / 60)
          .toString()
          .padStart(2, "0");
        const r = (s % 60).toString().padStart(2, "0");
        return `${m}:${r}`;
      }

      function renderTimer() {
        el("#timer").textContent = formatTime(state.timeLeft);
        if (state.timeLeft <= 60) {
          el("#timer").style.background = "#331a1a";
          el("#timer").style.borderColor = "#7f1d1d";
        }
        if (state.timeLeft <= 0) {
          submitQuiz();
        }
      }

      let tick = null;
      function startTimer() {
        if (tick) clearInterval(tick);
        const waktuTarget = Date.now() + state.timeLeft * 1000;
        tick = setInterval(() => {
          const waktuSekarang = Date.now();

          state.timeLeft = Math.ceil((waktuTarget - waktuSekarang) / 1000);

          if (state.timeLeft > 0) {
            renderTimer();
          } else {
            state.timeLeft = 0;
            renderTimer();
            clearInterval(tick);
          }
        }, 200);
      }

      function mountNav() {
        const nav = el("#nav");
        nav.innerHTML = "";
        QUESTIONS.forEach((q, idx) => {
          const b = document.createElement("button");
          b.textContent = idx + 1;
          b.addEventListener("click", () => {
            goTo(idx);
          });
          nav.appendChild(b);
        });
        updateNavActive();
      }

      function updateNavActive() {
        const buttons = els("#nav button");
        buttons.forEach((b, idx) => {
          b.classList.toggle("active", idx === state.currentIndex);
          b.classList.toggle("done", state.answers[idx] !== null);
        });
        el("#infoSoal").textContent = `Soal ${state.currentIndex + 1} / ${
          QUESTIONS.length
        }`;
        el("#infoKategori").textContent = `Kategori: ${QUESTIONS[
          state.currentIndex
        ].type.toUpperCase()}`;
      }

      function renderQuestion() {
        const q = QUESTIONS[state.currentIndex];
        const container = el("#questionArea");
        container.innerHTML = "";
        const title = document.createElement("div");
        title.className = "q-title";

        title.innerHTML = q.q;
        container.appendChild(title);

        const list = document.createElement("div");
        list.className = "choices";
        q.options.forEach((opt, i) => {
          const row = document.createElement("label");
          row.className = "choice";
          const input = document.createElement("input");
          input.type = "radio";
          input.name = "choice";
          input.value = i;
          input.checked = state.answers[state.currentIndex] === i;
          input.addEventListener("change", () => {
            state.answers[state.currentIndex] = i;
            updateNavActive();
          });
          const span = document.createElement("div");
          span.innerHTML = opt;
          row.appendChild(input);
          row.appendChild(span);
          list.appendChild(row);
        });
        container.appendChild(list);
        MathJax.typeset();
      }

      function goTo(idx) {
        state.currentIndex = Math.max(0, Math.min(QUESTIONS.length - 1, idx));
        updateNavActive();
        renderQuestion();
      }

      function next() {
        if (state.currentIndex < QUESTIONS.length - 1) {
          goTo(state.currentIndex + 1);
        }
      }
      function prev() {
        if (state.currentIndex > 0) {
          goTo(state.currentIndex - 1);
        }
      }

      function resetAnswers() {
        if (!confirm("Yakin reset semua jawaban?")) return;
        state.answers = Array(QUESTIONS.length).fill(null);
        updateNavActive();
        renderQuestion();
      }

      function submitQuiz() {
        // hitung skor per kategori
        let sSin = 0,
          sAnt = 0,
          sHip = 0;
        QUESTIONS.forEach((q, idx) => {
          const pick = state.answers[idx];
          const correct = q.answer;
          if (pick === correct) {
            if (q.type === "Penalaran") sSin++;
          }
        });
        const total = sSin + sAnt + sHip;

        // tampilkan
        let total_question = QUESTIONS.length;

        el("#scoreTotal").textContent = `${total} / ${total_question}`;
        el("#resultUser").textContent = `Peserta: ${
          state.user?.nama || "-"
        } (waktu habis/kumpul)`;

        // stop timer, ganti section
        if (tick) clearInterval(tick);
        showSection("result");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showSection(which) {
        el("#section-form").classList.remove("active");
        el("#section-quiz").classList.remove("active");
        el("#section-result").classList.remove("active");
        if (which === "form") el("#section-form").classList.add("active");
        if (which === "quiz") el("#section-quiz").classList.add("active");
        if (which === "result") el("#section-result").classList.add("active");
      }

      // EVENTS
      el("#btnMulai").addEventListener("click", () => {
        const nama = el("#nama").value.trim();
        const pass = el("#pass").value.trim();
        if (!nama || !pass) {
          alert("Nama dan password wajib diisi.");
          return;
        }
        if (pass !== "M1GARAND") {
          alert(
            "password salah! tanya password ke sir hardi. klo sir hardi dak tau tanya ke sir meca",
          );
          return;
        }
        state.user = { nama, pass };
        el("#infoUser").textContent = `Peserta: ${nama}`;
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });

      el("#prevBtn").addEventListener("click", prev);
      el("#nextBtn").addEventListener("click", next);
      el("#btnReset").addEventListener("click", resetAnswers);
      el("#btnSubmit").addEventListener("click", () => {
        if (confirm("BENIAN BAE KAU NIH CEK LAGI JAWABAN KAU TUH!"))
          submitQuiz();
      });

      // Keyboard nav: panah kiri/kanan, angka 1-4 untuk memilih A-D
      window.addEventListener("keydown", (e) => {
        if (!el("#section-quiz").classList.contains("active")) return;
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
        if (["1", "2", "3", "4"].includes(e.key)) {
          const idx = parseInt(e.key) - 1;
          state.answers[state.currentIndex] = idx;
          updateNavActive();
          renderQuestion();
        }
      });

      // Ulang dari hasil
      el("#btnUlang").addEventListener("click", () => {
        state = {
          user: state.user,
          timeLeft: 30 * 60,
          currentIndex: 0,
          answers: Array(180).fill(null),
        };
        QUESTIONS = shuffle(QUESTIONS); // acak ulang urutan
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });
    </script>
  </body>
</html>
