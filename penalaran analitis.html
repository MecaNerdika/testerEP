<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Penalaran Analitis</title>
    <style>
      :root {
        --bg: #060000; /* slate-900 */
        --card: #111827; /* gray-900 */
        --muted: #334155; /* slate-600 */
        --text: #ffffff; /* gray-200 */
        --accent: #38bdf8; /* sky-400 */
        --accent-2: #22c55e; /* green-500 */
        --danger: #ef4444; /* red-500 */
        --warn: #f59e0b; /* amber-500 */
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        background:
          radial-gradient(1200px 800px at 10% -10%, #1e293b, transparent),
          radial-gradient(800px 600px at 120% 0%, #0b3b47, transparent),
          var(--bg);
        color: var(--text);
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .app {
        width: 100%;
        max-width: 980px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: 0.5px;
        font-size: clamp(18px, 3.5vw, 24px);
      }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        padding: 10px 14px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #1f2a44;
        box-shadow: var(--shadow);
      }
      .card {
        background: linear-gradient(180deg, #0b1220, #0a1020);
        border: 1px solid #1f2a44;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .section {
        display: none;
      }
      .active {
        display: block;
      }
      .card-inner {
        padding: 20px;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }
      .grid-responsive {
        grid-template-columns: 1fr;
      }
      @media (min-width: 720px) {
        .grid-responsive {
          grid-template-columns: 1fr 320px;
        }
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #26314d;
        background: #0b1220;
        color: var(--text);
        outline: none;
        box-shadow: inset 0 0 0 9999px rgba(255, 255, 255, 0);
      }
      label {
        font-size: 14px;
        color: #cbd5e1;
      }
      .btn {
        cursor: pointer;
        padding: 12px 16px;
        border-radius: 14px;
        background: var(--accent);
        color: #001219;
        border: none;
        font-weight: 700;
        box-shadow: var(--shadow);
        transition: 0.2s transform ease;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn.secondary {
        background: #1f2937;
        color: #e2e8f0;
        border: 1px solid #334155;
      }
      .btn.warn {
        background: var(--warn);
        color: #0b1220;
      }
      .btn.danger {
        background: var(--danger);
        color: #0b1220;
      }
      .muted {
        color: #94a3b8;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #223156;
        font-size: 12px;
        color: #cbd5e1;
      }

      .question-area {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .q-title {
        font-weight: 400;
        font-size: 15px;
      }
      .choices {
        display: grid;
        gap: 10px;
      }
      .choice {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        border: 1px solid #1f2a44;
        background: #0b1220;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
      }
      .choice input {
        margin-top: 4px;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        max-height: 240px;
        overflow: auto;
        padding: 10px;
      }
      .nav button {
        width: 44px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid #1f2a44;
        background: #0b1220;
        color: #cbd5e1;
        font-weight: 700;
        cursor: pointer;
      }
      .nav button.active {
        outline: 2px solid var(--accent);
        color: #0ea5e9;
      }
      .nav button.done {
        background: #07291f;
        border-color: #0b7a53;
        color: #34d399;
      }

      .footer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 10px;
      }

      .legend {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .results {
        display: grid;
        gap: 12px;
      }
      .score-box {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .score-card {
        background: #0b1220;
        border: 1px solid #1f2a44;
        border-radius: 14px;
        padding: 14px;
      }

      .info-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">Penalaran Analitis</div>
        <div class="pill" id="infoUser">Belum login</div>
        <div class="timer" id="timer">--:--</div>
      </header>

      <!-- SECTION 1: FORM MINIMAL -->
      <section id="section-form" class="section active">
        <div class="card">
          <div class="card-inner grid">
            <div>
              <h2 style="margin: 0 0 10px 0">Masuk Kuis</h2>
              <p class="muted" style="margin-top: 0">
                Masukkan nama dan password untuk memulai. Tidak ada pengaturan
                tambahan.
              </p>
              <div class="grid">
                <div>
                  <label for="nama">Nama</label>
                  <input id="nama" type="text" placeholder="Nama peserta" />
                </div>
                <div>
                  <label for="pass">Password</label>
                  <input id="pass" type="password" placeholder="Password" />
                </div>
                <button class="btn" id="btnMulai">Mulai Kuis</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 2: QUIZ -->
      <section id="section-quiz" class="section">
        <div class="grid grid-responsive">
          <div class="card">
            <div class="card-inner">
              <div class="info-row">
                <div class="pill" id="infoKategori">Kategori: -</div>
                <div class="pill" id="infoSoal">Soal 0 / 180</div>
              </div>
              <div class="question-area" id="questionArea">
                <!-- Question inject here -->
              </div>
              <div class="footer-actions">
                <button class="btn secondary" id="prevBtn">Prev</button>
                <div class="legend">
                  <span class="pill">• Biru = aktif</span>
                  <span
                    class="pill"
                    style="
                      background: #07291f;
                      color: #34d399;
                      border-color: #0b7a53;
                    "
                    >• Hijau = terjawab</span
                  >
                </div>
                <button class="btn" id="nextBtn">Next</button>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <h3 style="margin-top: 0">Navigasi Soal</h3>
              <div class="nav" id="nav">
                <!-- Nav buttons injected here -->
              </div>
              <div class="grid" style="margin-top: 8px">
                <button class="btn warn" id="btnSubmit">
                  Kumpulkan Jawaban
                </button>
                <button class="btn danger" id="btnReset">Reset Jawaban</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 3: HASIL -->
      <section id="section-result" class="section">
        <div class="card">
          <div class="card-inner results">
            <h2 style="margin: 0">Hasil Ujian</h2>
            <p class="muted" id="resultUser">Peserta: -</p>
            <div class="score-box">
              <div class="score-card" style="grid-column: span 2">
                <div class="muted">Total Skor</div>
                <div id="scoreTotal" style="font-size: 30px; font-weight: 900">
                  0 / 180
                </div>
              </div>
            </div>
            <div>
              <button class="btn" id="btnUlang">Mulai Lagi</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      /** UTIL **/
      const el = (sel) => document.querySelector(sel);
      const els = (sel) => Array.from(document.querySelectorAll(sel));
      const shuffle = (arr) =>
        arr
          .map((v) => [Math.random(), v])
          .sort((a, b) => a[0] - b[0])
          .map((x) => x[1]);

      /** BANK SOAL (40/40/40) **/
      // Format: {type:'sinonim'|'antonim'|'hiponim', q:'', options:['','','',''], answer: index}

      const SOAL_fungsi = [
        {
          q: "Suatu meja bundar dikelilingi empat buah kursi.<br>➢ Andi, Budi, Cici, dan Dini menempati kursi tersebut.<br>➢ Budi dan Dini duduk saling berhadapan.<br><br>Jika Andi duduk di sebelah kiri Budi, maka pernyataan berikut yang <b>salah</b> adalah …",
          o: [
            "Budi duduk di sebelah kanan Andi",
            "Dini duduk di sebelah kanan Cici",
            "Cici duduk di sebelah kiri Andi",
            "Andi duduk di sebelah kanan Dini",
            "Cici duduk di sebelah kanan Budi",
          ],
          a: 4,
        },
        {
          q: "Suatu meja bundar dikelilingi empat buah kursi.<br>➢ Andi, Budi, Cici, dan Dini menempati kursi tersebut.<br>➢ Budi dan Dini duduk saling berhadapan.<br><br>Jika Andi duduk di sebelah kiri Dini, maka pernyataan berikut yang <b>benar</b> adalah …",
          o: [
            "Budi duduk di sebelah kanan Andi",
            "Dini duduk di sebelah kanan Cici",
            "Cici duduk di sebelah kiri Andi",
            "Andi duduk di sebelah kanan Cici",
            "Cici duduk di sebelah kanan Dini",
          ],
          a: 3,
        },
        {
          q: "Pak Ahmad mengadakan rapat bersama 6 stafnya (Banu, Chika, Doni, Elsa, Fina, dan Gilang) dengan menempati 8 kursi yang tersusun melingkar.<br>➢ Pak Ahmad duduk berhadapan dengan Gilang.<br>➢ Banu terpisah 1 kursi di sebelah kiri Pak Ahmad dan berhadapan dengan Chika.<br>➢ Doni duduk tepat di sebelah kanan Gilang dan berhadapan dengan Elsa.<br><br>Jika Chika duduk di sebelah kursi kosong, maka pernyataan yang <b>salah</b> adalah …",
          o: [
            "Chika dan Gilang dipisahkan oleh satu kursi kosong",
            "Fina menempati kursi tepat di sebelah kanan Banu",
            "Gilang dan Fina dipisahkan oleh dua kursi",
            "Elsa terpisah dua kursi dengan kursi kosong",
            "Pak Ahmad menempati kursi di antara Fina dan Elsa",
          ],
          a: 1,
        },
        {
          q: "Terdapat delapan kursi tersusun melingkar yang akan ditempati oleh 6 siswa dan 2 dosen.<br>➢ Kursi khusus dosen berwarna merah dan saling berhadapan.<br>➢ Kevin duduk di antara Lina dan Maya.<br>➢ Nora dan Oscar duduk bersebelahan.<br>➢ Oscar duduk berhadapan dengan Kevin.<br><br>Jika Nora duduk berhadapan dengan Lina, maka pernyataan yang <b>benar</b> adalah …",
          o: [
            "Maya duduk di sebelah Nora",
            "Dosen duduk di antara Putri dan Nora",
            "Putri duduk di hadapan Maya",
            "Oscar duduk di antara Putri dan Lina",
            "Nora duduk di sebelah Kevin",
          ],
          a: 3,
        },
        {
          q: "Terdapat delapan kursi tersusun melingkar yang akan ditempati oleh 6 siswa dan 2 dosen.<br>➢ Kursi khusus dosen berwarna merah dan saling berhadapan.<br>➢ Kevin duduk di antara Lina dan Maya.<br>➢ Nora dan Oscar duduk bersebelahan.<br>➢ Oscar duduk berhadapan dengan Kevin.<br><br>Jika Putri duduk berhadapan dengan Lina, maka pernyataan yang <b>benar</b> adalah …",
          o: [
            "Nora duduk di sebelah Maya",
            "Dosen duduk di antara Putri dan Maya",
            "Putri duduk di sebelah Nora",
            "Dosen duduk di antara Maya dan Lina",
            "Kevin duduk di sebelah Putri",
          ],
          a: 2,
        },
        {
          q: "Delapan guru (A, B, C, D, E, F, G, dan H) sedang duduk melingkar untuk membahas agenda sekolah dengan situasi sebagai berikut:<br>• D duduk tepat berseberangan dengan A.<br>• E duduk di samping kiri D.<br>• B duduk di antara G dan C.<br>• H duduk di antara A dan F.<br>• F duduk berhadapan dengan B.<br>• C duduk di sisi kiri A.<br><br>Apabila D dan B bertukar tempat, siapakah yang duduk di antara B dan F?",
          o: ["G", "H", "E", "C", "D"],
          a: 1,
        },
        {
          q: "Dalam suatu acara makan malam, 8 musisi (P, Q, R, S, T, U, V, dan W) duduk mengelilingi meja bundar.<br>➢ T duduk berhadapan dengan P.<br>➢ U duduk di antara W dan S.<br>➢ S dan R duduk tepat berhadapan.<br>➢ W duduk terpisah 2 kursi dari P.<br><br>Di antara beberapa kemungkinan di bawah ini, salah satu pilihan yang <b>tidak benar</b> adalah …",
          o: [
            "S duduk di antara U dan T",
            "R dan Q dipisahkan oleh P",
            "U duduk di antara W dan S",
            "S dipisahkan 2 kursi dengan P",
            "Q duduk di antara T dan W",
          ],
          a: 4,
        },
        {
          q: "Berdasarkan kondisi pada Soal Nomor 7 di atas, bila U dipisahkan oleh 2 kursi dengan Q, maka pernyataan di bawah ini yang <b>benar</b> adalah …",
          o: [
            "U dan V dipisahkan oleh 2 kursi",
            "U dan P duduk berseberangan",
            "Q dan W duduk berhadapan",
            "R duduk di sebelah T",
            "V duduk di dekat W",
          ],
          a: 4,
        },
        {
          q: "Keluarga Pak Budi sedang duduk di bangku taman yang terdiri dari 4 kursi sejajar. Di ujung paling kanan duduk Ibu Ani dan di ujung paling kiri duduk Tio. Bima dan Pak Budi duduk di antara keduanya.<br><br>Jika Tio bertukar tempat duduk dengan Bima yang duduk paling dekat dengannya dan sejenak kemudian Bima bertukar posisi dengan Ibu Ani, manakah pernyataan yang paling tepat untuk menggambarkan keadaan setelah bertukar posisi?",
          o: [
            "Tio duduk di paling ujung kanan",
            "Pak Budi berada di antara Ibu Ani dan Tio",
            "Ibu Ani duduk bersebelahan dengan suaminya",
            "Bima duduk paling ujung kiri menggantikan Tio",
            "Bima akhirnya duduk di paling ujung kanan menggantikan ibunya",
          ],
          a: 4,
        },
        {
          q: "Delapan ibu rumah tangga (A, B, C, D, E, F, G, dan H) membentuk lingkaran. Ibu B perlu menyampaikan dokumen sehingga meminta Ibu A sebagai ketua untuk berada di dekatnya. Ibu C persis di depan ketua dan di samping Ibu D berhadapan dengan Ibu E. Ibu F memahami Ibu G yang tidak mau berdekatan dengan Ibu C sehingga duduk di antara mereka.<br><br>Dengan demikian posisi Ibu H berada di …",
          o: [
            "Hadapan Ibu E",
            "Sebelah Ibu C",
            "Hadapan Ibu G",
            "Sebelah Ibu A",
            "Sebelah Ibu E",
          ],
          a: 4,
        },
        {
          q: "Tujuh orang pakar (A, B, C, D, E, F, G) dengan profesi berbeda (Dokter, Insinyur, Pengacara, Guru, Arsitek, Ekonom, Komputer) duduk mengelilingi meja bundar.<br>1. Dokter duduk tepat di antara B dan F.<br>2. C yang merupakan Arsitek duduk berhadapan dengan Guru.<br>3. E duduk 2 kursi di kanan Dokter dan tepat di sebelah Ekonom.<br>4. A adalah seorang Pengacara dan duduk berhadapan dengan B.<br>5. Insinyur duduk tepat di antara C dan Pengacara.<br><br>Siapakah yang berprofesi sebagai Guru dan duduk di sebelah siapa?",
          o: [
            "D, duduk di sebelah Dokter dan Arsitek",
            "G, duduk di sebelah Arsitek dan Ekonom",
            "F, duduk di sebelah Dokter dan Pengacara",
            "E, duduk di sebelah Insinyur dan Komputer",
            "D, duduk di sebelah Pengacara dan Ekonom",
          ],
          a: 4,
        },
        {
          q: "Delapan orang siswa (P, Q, R, S, T, U, V, W) duduk di dua deret meja bertatap muka (masing-masing 4 kursi di deret Utara dan 4 kursi di deret Selatan).<br>➢ P duduk di deret Utara, berhadapan langsung dengan T.<br>➢ Q duduk di sebelah kanan P dan berhadapan dengan U.<br>➢ R berada di salah satu ujung deret dan berhadapan dengan V.<br>➢ W tidak berada di deret yang sama dengan P.<br>➢ S berada tepat di antara T dan U.<br><br>Pernyataan manakah yang <b>pasti benar</b>?",
          o: [
            "W duduk berhadapan dengan S",
            "R berada di deret Selatan",
            "V duduk di ujung deret Utara",
            "Q duduk tepat di antara P dan R",
            "T berada di ujung paling kiri deret Selatan",
          ],
          a: 3,
        },
        {
          q: "Ada 6 peserta ujian (A, B, C, D, E, F) duduk melingkar.<br>➢ A tidak boleh duduk di sebelah B maupun C.<br>➢ D duduk tepat di antara B dan F.<br>➢ E duduk 2 kursi dari C.<br><br>Jika B berpindah tempat duduk dengan E, dan C berpindah tempat ke kursi yang membelakangi pintu (di antara A dan F), manakah susunan melingkar yang sesuai searah jarum jam?",
          o: [
            "A - D - B - F - C - E",
            "A - E - D - B - F - C",
            "A - C - F - D - B - E",
            "A - B - D - F - C - E",
            "A - F - D - E - B - C",
          ],
          a: 2,
        },
        {
          q: "Lima orang pejabat (P, Q, R, S, T) duduk melingkar. Masing-masing membawa mobil dengan warna berbeda (Merah, Kuning, Hijau, Biru, Hitam).<br>➢ Pemilik mobil Merah duduk di sebelah kiri P.<br>➢ Q duduk di antara pemilik mobil Hijau dan Hitam.<br>➢ R adalah pemilik mobil Kuning dan duduk tepat berhadapan dengan S.<br>➢ Pemilik mobil Hitam duduk berseberangan dengan P.<br>➢ T bukan pemilik mobil Merah maupun Biru.<br><br>Mobil warna apa yang dimiliki oleh P dan siapakah yang duduk di sebelah kanannya?",
          o: [
            "Mobil Biru; pemilik mobil Merah",
            "Mobil Biru; R",
            "Mobil Hijau; Q",
            "Mobil Hitam; S",
            "Mobil Merah; T",
          ],
          a: 1,
        },
        {
          q: "Delapan peserta rapat (A, B, C, D, E, F, G, H) duduk mengelilingi meja persegi panjang. Sisi panjang masing-masing berisi 3 kursi, dan sisi lebar masing-masing berisi 1 kursi (ujung meja).<br>➢ A dan E duduk di kedua ujung meja (sisi lebar).<br>➢ B duduk di sisi panjang, berseberangan dengan F.<br>➢ C duduk di antara B dan D.<br>➢ G duduk di sebelah E pada sisi panjang yang sama dengan F.<br>➢ H duduk berseberangan dengan C.<br><br>Siapakah yang duduk tepat di antara F dan G?",
          o: ["D", "H", "B", "Tidak ada, F dan G duduk bersebelahan", "C"],
          a: 3,
        },
        {
          q: "Sembilan orang siswa duduk dalam formasi bioskop 3x3 (Baris 1 Depan, Baris 2 Tengah, Baris 3 Belakang; Kolom Kiri, Tengah, Kanan).<br>➢ A duduk di baris paling depan kolom tengah.<br>➢ B duduk tepat di belakang A.<br>➢ C duduk di sebelah kiri B.<br>➢ D duduk di baris paling belakang, tepat di belakang B.<br>➢ E duduk di depan C.<br>➢ F duduk di sebelah kanan B.<br>➢ G duduk di sebelah kiri D.<br>➢ H dan I mengisi sisa tempat yang kosong.<br><br>Jika H duduk di baris pertama, di manakah posisi I?",
          o: [
            "Baris Belakang Kolom Kanan",
            "Baris Tengah Kolom Kanan",
            "Baris Depan Kolom Kanan",
            "Baris Belakang Kolom Tengah",
            "Baris Tengah Kolom Kiri",
          ],
          a: 0,
        },
        {
          q: "10 orang anggota klub (A s/d J) duduk melingkar pada 10 kursi berdampingan bernomor 1 sampai 10 searah jarum jam.<br>➢ Kursi 1 ditempati oleh A.<br>➢ F duduk tepat berseberangan dengan A.<br>➢ C duduk di kursi nomor 4.<br>➢ H duduk di antara A dan C.<br>➢ J duduk di kursi nomor 8.<br>➢ D dan E duduk berdampingan di kursi bernomor genap.<br>➢ G duduk tepat di sebelah kiri F.<br><br>Di manakah posisi duduk B jika B tidak mau duduk di sebelah J?",
          o: ["Kursi 2", "Kursi 3", "Kursi 7", "Kursi 9", "Kursi 10"],
          a: 3,
        },
        {
          q: "Enam diplomat (U, V, W, X, Y, Z) duduk mengelilingi meja bundar.<br>➢ Jika U duduk di sebelah V, maka W pasti duduk di sebelah X.<br>➢ Z duduk berhadapan dengan V.<br>➢ Y selalu duduk di antara W dan Z.<br>➢ Ternyata U duduk tepat di sebelah kiri V.<br><br>Siapakah yang duduk tepat berhadapan dengan U?",
          o: ["X", "W", "Y", "Z", "V"],
          a: 0,
        },
        {
          q: "Empat pria (P1, P2, P3, P4) dan empat wanita (W1, W2, W3, W4) duduk melingkar dengan aturan:<br>➢ Tidak ada dua pria atau dua wanita yang duduk berdampingan (berselingan).<br>➢ P1 duduk berhadapan dengan P3.<br>➢ W1 duduk di sebelah kanan P1 dan berhadapan dengan W3.<br>➢ P2 tidak duduk di sebelah W3.<br><br>Siapakah yang duduk di antara W2 dan W4?",
          o: ["P1", "P2", "P3", "P4", "W1"],
          a: 2,
        },
        {
          q: "Tujuh orang (A, B, C, D, E, F, G) duduk sejajar pada barisan kursi bernomor 1 sampai 7 dari kiri ke kanan.<br>➢ Posisi awal: A di 1, B di 2, C di 3, D di 4, E di 5, F di 6, G di 7.<br>➢ Pertukaran 1: Orang di kursi bernomor ganjil bergeser tukar tempat dengan orang di sebelah kanannya (1 dengan 2, 3 dengan 4, 5 dengan 6; 7 tetap).<br>➢ Pertukaran 2: Orang di posisi ujung-ujung bertukar tempat.<br>➢ Pertukaran 3: Orang di posisi tengah (kursi 4) bertukar tempat dengan orang di kursi 2.<br><br>Siapakah yang berada di kursi nomor 2, 4, dan 6 secara berurutan pada posisi akhir?",
          o: ["A, D, E", "G, B, E", "G, C, A", "B, D, F", "E, G, A"],
          a: 1,
        },
      ].map((x) => ({
        type: "Penalaran",
        q: x.q,
        options: x.o,
        answer: x.a,
      }));

      S_fungsi = shuffle(SOAL_fungsi);

      /*  Validasi jumlah
                                  if(SINONIM.length!==90||ANTONIM.length!==90){
                                    console.warn('Jumlah soal tidak 90/90:', SINONIM.length, ANTONIM.length);
                                  }  */

      // /* Gabung & acak
      function shuffleOptions(q) {
        let opts = q.options.map((opt, i) => ({ opt, i }));
        opts = shuffle(opts); // pake fungsi shuffle yang sudah kamu punya
        let newAnswer = opts.findIndex((o) => o.i === q.answer);
        return {
          ...q,
          options: opts.map((o) => o.opt),
          answer: newAnswer,
        };
      }
      //*/
      let QUESTIONS = [...S_fungsi].map((q, i) => ({
        id: i + 1,
        ...shuffleOptions(q),
      }));
      // let QUESTIONS = [...SINONIM, ...ANTONIM].map((q,i)=>({id:i+1, ...q }));
      // State
      let state = {
        user: null,
        timeLeft: 30 * 60, // 25 menit
        currentIndex: 0,
        answers: Array(180).fill(null), // simpan index jawaban (0..3) atau null
      };

      /** RENDERING **/
      function formatTime(s) {
        const m = Math.floor(s / 60)
          .toString()
          .padStart(2, "0");
        const r = (s % 60).toString().padStart(2, "0");
        return `${m}:${r}`;
      }

      function renderTimer() {
        el("#timer").textContent = formatTime(state.timeLeft);
        if (state.timeLeft <= 60) {
          el("#timer").style.background = "#331a1a";
          el("#timer").style.borderColor = "#7f1d1d";
        }
        if (state.timeLeft <= 0) {
          submitQuiz();
        }
      }

      let tick = null;
      function startTimer() {
        if (tick) clearInterval(tick);
        const waktuTarget = Date.now() + state.timeLeft * 1000;
        tick = setInterval(() => {
          const waktuSekarang = Date.now();

          state.timeLeft = Math.ceil((waktuTarget - waktuSekarang) / 1000);

          if (state.timeLeft > 0) {
            renderTimer();
          } else {
            state.timeLeft = 0;
            renderTimer();
            clearInterval(tick);
          }
        }, 200);
      }

      function mountNav() {
        const nav = el("#nav");
        nav.innerHTML = "";
        QUESTIONS.forEach((q, idx) => {
          const b = document.createElement("button");
          b.textContent = idx + 1;
          b.addEventListener("click", () => {
            goTo(idx);
          });
          nav.appendChild(b);
        });
        updateNavActive();
      }

      function updateNavActive() {
        const buttons = els("#nav button");
        buttons.forEach((b, idx) => {
          b.classList.toggle("active", idx === state.currentIndex);
          b.classList.toggle("done", state.answers[idx] !== null);
        });
        el("#infoSoal").textContent = `Soal ${state.currentIndex + 1} / ${
          QUESTIONS.length
        }`;
        el("#infoKategori").textContent = `Kategori: ${QUESTIONS[
          state.currentIndex
        ].type.toUpperCase()}`;
      }

      function renderQuestion() {
        const q = QUESTIONS[state.currentIndex];
        const container = el("#questionArea");
        container.innerHTML = "";
        const title = document.createElement("div");
        title.className = "q-title";

        title.innerHTML = q.q;
        container.appendChild(title);

        const list = document.createElement("div");
        list.className = "choices";
        q.options.forEach((opt, i) => {
          const row = document.createElement("label");
          row.className = "choice";
          const input = document.createElement("input");
          input.type = "radio";
          input.name = "choice";
          input.value = i;
          input.checked = state.answers[state.currentIndex] === i;
          input.addEventListener("change", () => {
            state.answers[state.currentIndex] = i;
            updateNavActive();
          });
          const span = document.createElement("div");
          span.innerHTML = opt;
          row.appendChild(input);
          row.appendChild(span);
          list.appendChild(row);
        });
        container.appendChild(list);
        MathJax.typeset();
      }

      function goTo(idx) {
        state.currentIndex = Math.max(0, Math.min(QUESTIONS.length - 1, idx));
        updateNavActive();
        renderQuestion();
      }

      function next() {
        if (state.currentIndex < QUESTIONS.length - 1) {
          goTo(state.currentIndex + 1);
        }
      }
      function prev() {
        if (state.currentIndex > 0) {
          goTo(state.currentIndex - 1);
        }
      }

      function resetAnswers() {
        if (!confirm("Yakin reset semua jawaban?")) return;
        state.answers = Array(QUESTIONS.length).fill(null);
        updateNavActive();
        renderQuestion();
      }

      function submitQuiz() {
        // hitung skor per kategori
        let sSin = 0,
          sAnt = 0,
          sHip = 0;
        QUESTIONS.forEach((q, idx) => {
          const pick = state.answers[idx];
          const correct = q.answer;
          if (pick === correct) {
            if (q.type === "Penalaran") sSin++;
          }
        });
        const total = sSin + sAnt + sHip;

        // tampilkan
        let total_question = QUESTIONS.length;

        el("#scoreTotal").textContent = `${total} / ${total_question}`;
        el("#resultUser").textContent = `Peserta: ${
          state.user?.nama || "-"
        } (waktu habis/kumpul)`;

        // stop timer, ganti section
        if (tick) clearInterval(tick);
        showSection("result");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showSection(which) {
        el("#section-form").classList.remove("active");
        el("#section-quiz").classList.remove("active");
        el("#section-result").classList.remove("active");
        if (which === "form") el("#section-form").classList.add("active");
        if (which === "quiz") el("#section-quiz").classList.add("active");
        if (which === "result") el("#section-result").classList.add("active");
      }

      // EVENTS
      el("#btnMulai").addEventListener("click", () => {
        const nama = el("#nama").value.trim();
        const pass = el("#pass").value.trim();
        if (!nama || !pass) {
          alert("Nama dan password wajib diisi.");
          return;
        }
        if (pass !== "M1GARAND") {
          alert(
            "password salah! tanya password ke sir hardi. klo sir hardi dak tau tanya ke sir meca",
          );
          return;
        }
        state.user = { nama, pass };
        el("#infoUser").textContent = `Peserta: ${nama}`;
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });

      el("#prevBtn").addEventListener("click", prev);
      el("#nextBtn").addEventListener("click", next);
      el("#btnReset").addEventListener("click", resetAnswers);
      el("#btnSubmit").addEventListener("click", () => {
        if (confirm("BENIAN BAE KAU NIH CEK LAGI JAWABAN KAU TUH!"))
          submitQuiz();
      });

      // Keyboard nav: panah kiri/kanan, angka 1-4 untuk memilih A-D
      window.addEventListener("keydown", (e) => {
        if (!el("#section-quiz").classList.contains("active")) return;
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
        if (["1", "2", "3", "4"].includes(e.key)) {
          const idx = parseInt(e.key) - 1;
          state.answers[state.currentIndex] = idx;
          updateNavActive();
          renderQuestion();
        }
      });

      // Ulang dari hasil
      el("#btnUlang").addEventListener("click", () => {
        state = {
          user: state.user,
          timeLeft: 30 * 60,
          currentIndex: 0,
          answers: Array(180).fill(null),
        };
        QUESTIONS = shuffle(QUESTIONS); // acak ulang urutan
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });
    </script>
  </body>
</html>
