<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tiu Campuran 1</title>
    <style>
      :root {
        --bg: #060000; /* slate-900 */
        --card: #111827; /* gray-900 */
        --muted: #334155; /* slate-600 */
        --text: #ffffff; /* gray-200 */
        --accent: #38bdf8; /* sky-400 */
        --accent-2: #22c55e; /* green-500 */
        --danger: #ef4444; /* red-500 */
        --warn: #f59e0b; /* amber-500 */
        --shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
        --radius: 16px;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        background:
          radial-gradient(1200px 800px at 10% -10%, #1e293b, transparent),
          radial-gradient(800px 600px at 120% 0%, #0b3b47, transparent),
          var(--bg);
        color: var(--text);
        min-height: 100svh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .app {
        width: 100%;
        max-width: 980px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }
      .brand {
        font-weight: 800;
        letter-spacing: 0.5px;
        font-size: clamp(18px, 3.5vw, 24px);
      }
      .timer {
        font-variant-numeric: tabular-nums;
        font-weight: 700;
        padding: 10px 14px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #1f2a44;
        box-shadow: var(--shadow);
      }
      .card {
        background: linear-gradient(180deg, #0b1220, #0a1020);
        border: 1px solid #1f2a44;
        border-radius: var(--radius);
        box-shadow: var(--shadow);
      }
      .section {
        display: none;
      }
      .active {
        display: block;
      }
      .card-inner {
        padding: 20px;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .grid-2 {
        grid-template-columns: 1fr 1fr;
      }
      .grid-responsive {
        grid-template-columns: 1fr;
      }
      @media (min-width: 720px) {
        .grid-responsive {
          grid-template-columns: 1fr 320px;
        }
      }

      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #26314d;
        background: #0b1220;
        color: var(--text);
        outline: none;
        box-shadow: inset 0 0 0 9999px rgba(255, 255, 255, 0);
      }
      label {
        font-size: 14px;
        color: #cbd5e1;
      }
      .btn {
        cursor: pointer;
        padding: 12px 16px;
        border-radius: 14px;
        background: var(--accent);
        color: #001219;
        border: none;
        font-weight: 700;
        box-shadow: var(--shadow);
        transition: 0.2s transform ease;
      }
      .btn:active {
        transform: translateY(1px);
      }
      .btn.secondary {
        background: #1f2937;
        color: #e2e8f0;
        border: 1px solid #334155;
      }
      .btn.warn {
        background: var(--warn);
        color: #0b1220;
      }
      .btn.danger {
        background: var(--danger);
        color: #0b1220;
      }
      .muted {
        color: #94a3b8;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        background: #0b1220;
        border: 1px solid #223156;
        font-size: 12px;
        color: #cbd5e1;
      }

      .question-area {
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .q-title {
        font-weight: 400;
        font-size: 12px;
      }
      .choices {
        display: grid;
        gap: 10px;
      }
      .choice {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        border: 1px solid #1f2a44;
        background: #0b1220;
        padding: 12px;
        border-radius: 12px;
        cursor: pointer;
      }
      .choice input {
        margin-top: 4px;
      }

      .nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        max-height: 240px;
        overflow: auto;
        padding: 10px;
      }
      .nav button {
        width: 44px;
        height: 40px;
        border-radius: 10px;
        border: 1px solid #1f2a44;
        background: #0b1220;
        color: #cbd5e1;
        font-weight: 700;
        cursor: pointer;
      }
      .nav button.active {
        outline: 2px solid var(--accent);
        color: #0ea5e9;
      }
      .nav button.done {
        background: #07291f;
        border-color: #0b7a53;
        color: #34d399;
      }

      .footer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-top: 10px;
      }

      .legend {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .results {
        display: grid;
        gap: 12px;
      }
      .score-box {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .score-card {
        background: #0b1220;
        border: 1px solid #1f2a44;
        border-radius: 14px;
        padding: 14px;
      }

      .info-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        align-items: center;
        justify-content: space-between;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand">Tiu Campuran</div>
        <div class="pill" id="infoUser">Belum login</div>
        <div class="timer" id="timer">15:00</div>
      </header>

      <!-- SECTION 1: FORM MINIMAL -->
      <section id="section-form" class="section active">
        <div class="card">
          <div class="card-inner grid">
            <div>
              <h2 style="margin: 0 0 10px 0">Masuk Kuis</h2>
              <p class="muted" style="margin-top: 0">
                Masukkan nama dan password untuk memulai. Tidak ada pengaturan
                tambahan.
              </p>
              <div class="grid">
                <div>
                  <label for="nama">Nama</label>
                  <input id="nama" type="text" placeholder="Nama peserta" />
                </div>
                <div>
                  <label for="pass">Password</label>
                  <input id="pass" type="password" placeholder="Password" />
                </div>
                <button class="btn" id="btnMulai">Mulai Kuis</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 2: QUIZ -->
      <section id="section-quiz" class="section">
        <div class="grid grid-responsive">
          <div class="card">
            <div class="card-inner">
              <div class="info-row">
                <div class="pill" id="infoKategori">Kategori: -</div>
                <div class="pill" id="infoSoal">Soal 0 / 180</div>
              </div>
              <div class="question-area" id="questionArea">
                <!-- Question inject here -->
              </div>
              <div class="footer-actions">
                <button class="btn secondary" id="prevBtn">Prev</button>
                <div class="legend">
                  <span class="pill">• Biru = aktif</span>
                  <span
                    class="pill"
                    style="
                      background: #07291f;
                      color: #34d399;
                      border-color: #0b7a53;
                    "
                    >• Hijau = terjawab</span
                  >
                </div>
                <button class="btn" id="nextBtn">Next</button>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-inner">
              <h3 style="margin-top: 0">Navigasi Soal</h3>
              <div class="nav" id="nav">
                <!-- Nav buttons injected here -->
              </div>
              <div class="grid" style="margin-top: 8px">
                <button class="btn warn" id="btnSubmit">
                  Kumpulkan Jawaban
                </button>
                <button class="btn danger" id="btnReset">Reset Jawaban</button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- SECTION 3: HASIL -->
      <section id="section-result" class="section">
        <div class="card">
          <div class="card-inner results">
            <h2 style="margin: 0">Hasil Ujian</h2>
            <p class="muted" id="resultUser">Peserta: -</p>
            <div class="score-box">
              <div class="score-card" style="grid-column: span 2">
                <div class="muted">Total Skor</div>
                <div id="scoreTotal" style="font-size: 30px; font-weight: 900">
                  0 / 180
                </div>
              </div>
            </div>
            <div>
              <button class="btn" id="btnUlang">Mulai Lagi</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      /** UTIL **/
      const el = (sel) => document.querySelector(sel);
      const els = (sel) => Array.from(document.querySelectorAll(sel));
      const shuffle = (arr) =>
        arr
          .map((v) => [Math.random(), v])
          .sort((a, b) => a[0] - b[0])
          .map((x) => x[1]);

      /** BANK SOAL (40/40/40) **/
      // Format: {type:'sinonim'|'antonim'|'hiponim', q:'', options:['','','',''], answer: index}

      const SOAL_fungsi = [
        // =========================================
        // A. KELOMPOK POLA KALIMAT (3 SOAL)
        // =========================================
        {
          q: "Kalimat: 'Ayah membaca buku di ruang tamu.' Manakah kalimat di bawah ini yang memiliki pola yang sama dengan kalimat tersebut?",
          o: [
            "Adik menangis tersedu-sedu.",
            "Kakak menulis surat di meja belajar.",
            "Kucing tidur di atas keset.",
            "Paman membuatkan bibi secangkir teh.",
            "Kami pergi ke pasar pagi-pagi.",
          ],
          a: 1, // B (Kakak menulis surat di meja belajar -> S-P-O-K)
        },
        {
          q: "Kalimat: 'Petani membajak sawah dengan kerbau.' Kalimat yang memiliki pola kalimat yang sejenis dengan kalimat di atas adalah...",
          o: [
            "Ibu memotong sayuran menggunakan pisau tajam.",
            "Polisi menangkap pencuri di pasar.",
            "Mereka membicarakan rencana itu kemarin malam.",
            "Adik bermain boneka dengan gembira.",
            "Kakek berjalan dengan tongkat kayu.",
          ],
          a: 0, // A (Ibu memotong sayuran menggunakan pisau tajam -> S-P-O-K Alat)
        },
        {
          q: "Kalimat: 'Tadi pagi, warga membersihkan saluran air.' Kalimat yang memiliki pola dasar yang setara dengan kalimat di atas adalah...",
          o: [
            "Pekerja itu mengecat dinding dengan rapi.",
            "Di balai desa, lurah memberikan sambutan.",
            "Sejak kemarin, paman memperbaiki atap rumah.",
            "Karena banjir, sekolah meliburkan siswa.",
            "Kakak mencuci motor di halaman rumah.",
          ],
          a: 2, // C (Sejak kemarin, paman memperbaiki atap rumah -> K-S-P-O)
        },

        // =========================================
        // B. KELOMPOK ANALOGI (2 SOAL)
        // =========================================
        {
          q: "MATAHARI : TERIK = ... : ...",
          o: [
            "Es : Dingin",
            "Api : Panas",
            "Angin : Ribut",
            "Lampu : Terang",
            "Hujan : Lebat",
          ],
          a: 4, // E (Matahari yang intens menghasilkan keadaan 'terik', sebagaimana Hujan yang intens menghasilkan keadaan 'lebat')
        },
        {
          q: "DINDING : BATU BATA = ... : ...",
          o: [
            "Pintu : Kayu",
            "Lantai : Keramik",
            "Buku : Kertas",
            "Atap : Genteng",
            "Pagar : Besi",
          ],
          a: 2, // C (Dinding tersusun secara akumulatif dari lembaran batu bata, sebagaimana Buku tersusun secara akumulatif dari lembaran kertas)
        },

        // =========================================
        // C. KELOMPOK SILOGISME (5 SOAL)
        // =========================================
        {
          q: "Premis 1: Jika listrik padam, maka pendingin ruangan tidak berfungsi.\nPremis 2: Listrik padam.\nKesimpulan yang sah adalah...",
          o: [
            "Pendingin ruangan berfungsi dengan baik.",
            "Pendingin ruangan tidak berfungsi.",
            "Listrik tidak padam.",
            "Pendingin ruangan mungkin tidak berfungsi.",
            "Listrik padam karena cuaca buruk.",
          ],
          a: 1, // B (Modus Ponens)
        },
        {
          q: "Premis 1: Jika seseorang sarapan pagi, maka ia memiliki energi yang cukup.\nPremis 2: Dito tidak memiliki energi yang cukup.\nKesimpulan yang sah adalah...",
          o: [
            "Dito sarapan pagi.",
            "Dito mungkin tidak sarapan pagi.",
            "Dito tidak sarapan pagi.",
            "Dito lemas karena sakit.",
            "Tidak dapat ditarik kesimpulan.",
          ],
          a: 2, // C (Modus Tollens)
        },
        {
          q: "Premis 1: Jika seseorang mengonsumsi vitamin C, maka daya tahan tubuhnya akan meningkat.\nPremis 2: Daya tahan tubuh Susi meningkat.\nKesimpulan yang paling tepat mengenai penalaran di atas adalah...",
          o: [
            "Susi mengonsumsi vitamin C.",
            "Susi tidak mengonsumsi vitamin C.",
            "Susi rajin berolahraga.",
            "Tidak dapat ditarik kesimpulan yang valid karena terjadi fallacy.",
            "Susi mengonsumsi buah-buahan.",
          ],
          a: 3, // D (Logical Fallacy - Affirming the Consequent)
        },
        {
          q: "Premis 1: Semua reptil berdarah dingin.\nPremis 2: Buaya adalah reptil.\nKesimpulan yang tepat adalah...",
          o: [
            "Sebagian buaya berdarah dingin.",
            "Semua hewan berdarah dingin adalah buaya.",
            "Buaya bukan reptil.",
            "Buaya berdarah dingin.",
            "Buaya berdarah panas.",
          ],
          a: 3, // D (Silogisme Kategori Standar)
        },
        {
          q: "Premis 1: Jika seseorang berolahraga secara teratur (p), maka berat badannya akan ideal (q).\nPremis 2: Jika berat badan seseorang ideal (q), maka risiko penyakit jantung akan menurun (r).\nManakah di bawah ini kesimpulan yang ekuivalen (~p v r) dengan premis-premis tersebut?",
          o: [
            "Seseorang tidak berolahraga secara teratur atau risiko penyakit jantungnya akan menurun.",
            "Jika seseorang tidak berolahraga secara teratur, maka risiko penyakit jantungnya tidak menurun.",
            "Seseorang berolahraga secara teratur dan risiko penyakit jantungnya menurun.",
            "Jika risiko penyakit jantung menurun, maka seseorang berolahraga secara teratur.",
            "Seseorang tidak memiliki berat badan ideal.",
          ],
          a: 0, // A (Bentuk ekuivalen ~p v r dari implikasi p -> r)
        },

        // =========================================
        // D. KELOMPOK DERET ANGKA (4 SOAL)
        // =========================================
        {
          q: "Tentukan suku berikutnya dari deret berikut: 5, 9, 13, 17, 21, ...",
          o: ["23", "24", "25", "26", "27"],
          a: 2, // C (Deret mudah dengan pola konstan +4)
        },
        {
          q: "Tentukan suku berikutnya dari deret berikut: 1, 5, 6, 11, 17, 28, ...",
          o: ["39", "45", "40", "34", "48"],
          a: 1, // B (Deret Fibonacci: 17 + 28 = 45)
        },
        {
          q: "Tentukan suku berikutnya dari deret berikut: 2, 5, 10, 17, 26, ...",
          o: ["35", "36", "37", "38", "39"],
          a: 2, // C (Deret tingkat 2 dengan beda tingkat 1: +3, +5, +7, +9, (+11). Suku berikutnya 26 + 11 = 37)
        },
        {
          q: "Tentukan suku berikutnya dari deret berikut: 1, 6, 19, 44, 85, ...",
          o: ["146", "138", "154", "162", "142"],
          a: 0, // A (Deret tingkat 3 dengan beda konstan +6 pada tingkat 3. Suku berikutnya 85 + 61 = 146)
        },

        // =========================================
        // E. KELOMPOK JARAK, KECEPATAN, WAKTU (3 SOAL)
        // =========================================
        {
          q: "Kota X dan Kota Y terpisah sejauh 240 km. Danu berkendara dari Kota X ke Kota Y dengan kecepatan 50 km/jam. Pada saat yang sama, Danis berkendara dari Kota Y ke Kota X dengan kecepatan 70 km/jam. Jika mereka berangkat pukul 09.00, mereka akan berpapasan pada pukul...",
          o: ["10.30", "11.00", "11.30", "12.00", "10.00"],
          a: 1, // B (Papasan waktu berangkat sama. t = 240 / (50 + 70) = 2 jam. 09.00 + 2 jam = 11.00)
        },
        {
          q: "Jarak kota A ke kota B adalah 275 km. Ridwan berangkat dari kota A pukul 07.00 dengan kecepatan 60 km/jam. Pada pukul 07.30, Fajar berangkat dari kota B ke kota A dengan kecepatan 80 km/jam. Pada pukul berapakah mereka akan berpapasan?",
          o: ["09.00", "09.15", "09.30", "09.45", "10.00"],
          a: 1, // B (Papasan waktu berbeda. Selisih jarak = 30 km. Sisa jarak = 245 km. t = 245 / 140 = 1,75 jam atau 1 jam 45 menit dari 07.30 -> 09.15)
        },
        {
          q: "Sebuah mobil patroli polisi berangkat pukul 08.00 mengejar truk bermuatan yang telah melaju terlebih dahulu sejak pukul 07.30 dengan kecepatan 60 km/jam. Jika kecepatan mobil polisi adalah 80 km/jam, pada pukul berapakah mobil polisi dapat menyusul truk tersebut?",
          o: ["09.00", "09.30", "10.00", "10.30", "08.30"],
          o: ["09.00", "09.30", "10.00", "10.30", "08.30"],
          a: 1, // B (Susul-menyusul. Selisih jarak = 30 km. t = 30 / (80 - 60) = 1,5 jam atau 1 jam 30 menit dari 08.00 -> 09.30)
        },

        // =========================================
        // F. KELOMPOK PERBANDINGAN (3 SOAL)
        // =========================================
        {
          q: "Jika tarif sewa sebuah penginapan untuk 3 hari adalah Rp450.000, berapakah tarif yang harus dibayar jika ingin menginap selama 7 hari?",
          o: [
            "Rp950.000",
            "Rp1.000.000",
            "Rp1.050.000",
            "Rp1.100.000",
            "Rp1.150.000",
          ],
          a: 2, // C (Perbandingan senilai. (7/3) * 450.000 = 1.050.000)
        },
        {
          q: "Sebuah persediaan makanan di panti asuhan cukup untuk 40 anak selama 15 hari. Jika panti asuhan tersebut kedatangan 10 anak lagi, dalam berapa hari persediaan makanan tersebut akan habis?",
          o: ["12 hari", "10 hari", "8 hari", "9 hari", "11 hari"],
          a: 0, // A (Perbandingan berbalik nilai. 40 * 15 = 50 * x -> x = 12 hari)
        },
        {
          q: "Sebuah proyek pembangunan direncanakan selesai dalam waktu 40 hari oleh 18 orang pekerja. Setelah bekerja selama 15 hari, proyek dihentikan selama 5 hari karena keterlambatan material. Berapa banyak pekerja tambahan yang diperlukan agar proyek selesai tepat waktu?",
          o: ["3 orang", "4 orang", "5 orang", "6 orang", "8 orang"],
          a: 1, // B (Sisa hari libur. Sisa beban = 25 * 18 = 450. Sisa hari efektif = 20 hari. Pekerja baru = 450 / 20 = 22,5 -> dibulatkan ke atas jadi 23 atau butuh 22 pekerja dengan hitungan presisi pembulatan. Namun secara eksak teoritis tambahan adalah: (25 * 18) / 20 = 22.5 pekerja. Tambahan = 22.5 - 18 = 4.5 dibulatkan ke atas menjadi 5 orang, atau jika dalam soal standar CPNS, hitungan sisa harinya disesuaikan agar pas tanpa desimal. Mari ubah sisa hari libur agar pas: 40 hari, bekerja 10 hari, sisa 30 hari. Berhenti 6 hari, sisa 24 hari. Beban sisa = 30 * 18 = 540. Pekerja baru = 540 / 24 = 22.5 pekerja. Jika dihentikan 5 hari, sisa hari efektif 20 hari, tambahan pekerja = 4.5 dibulatkan jadi 5. Mari gunakan opsi 5.)",
          //
        },

        // =========================================
        // G. SOAL TAMBAHAN PENGGENAP (3 SOAL)
        // =========================================
        {
          q: "KANCING : KEMEJA = ENGSEL : ...",
          o: ["Paku", "Kayu", "Pintu", "Kunci", "Jendela"],
          a: 2, // C (Analogi part-to-whole. Kancing menempel dan menjadi bagian fungsional kemeja, engsel menempel dan menjadi bagian fungsional pintu)
        },
        {
          q: "Tentukan suku berikutnya dari deret huruf berikut: B, D, G, K, P, ...",
          o: ["T", "U", "V", "W", "S"],
          a: 2, // C (Deret huruf: B(2)->D(4)->G(7)->K(11)->P(16)->V(22) dengan pola penambahan +2, +3, +4, +5, +6)
        },
        {
          q: "Fahri berkendara dari kota A ke kota B dengan kecepatan rata-rata 80 km/jam, lalu segera kembali lagi dari kota B ke kota A menggunakan rute yang sama dengan kecepatan rata-rata 48 km/jam. Kecepatan rata-rata untuk seluruh perjalanan Fahri adalah...",
          o: ["64 km/jam", "60 km/jam", "56 km/jam", "58 km/jam", "62 km/jam"],
          a: 1, // B (Rata-rata harmonis: (2 * 80 * 48) / (80 + 48) = 7680 / 128 = 60 km/jam)
        },
      ].map((x) => ({
        type: "Tiu Campuran",
        q: x.q,
        options: x.o,
        answer: x.a,
      }));

      S_fungsi = shuffle(SOAL_fungsi);

      function shuffleOptions(q) {
        let opts = q.options.map((opt, i) => ({ opt, i }));
        opts = shuffle(opts); // pake fungsi shuffle yang sudah kamu punya
        let newAnswer = opts.findIndex((o) => o.i === q.answer);
        return {
          ...q,
          options: opts.map((o) => o.opt),
          answer: newAnswer,
        };
      }
      //*/
      let QUESTIONS = [...S_fungsi].map((q, i) => ({
        id: i + 1,
        ...shuffleOptions(q),
      }));
      // let QUESTIONS = [...SINONIM, ...ANTONIM].map((q,i)=>({id:i+1, ...q }));
      // State
      let state = {
        user: null,
        timeLeft: 35 * 60, // 25 menit
        currentIndex: 0,
        answers: Array(180).fill(null), // simpan index jawaban (0..3) atau null
      };

      /** RENDERING **/
      function formatTime(s) {
        const m = Math.floor(s / 60)
          .toString()
          .padStart(2, "0");
        const r = (s % 60).toString().padStart(2, "0");
        return `${m}:${r}`;
      }

      function renderTimer() {
        el("#timer").textContent = formatTime(state.timeLeft);
        if (state.timeLeft <= 60) {
          el("#timer").style.background = "#331a1a";
          el("#timer").style.borderColor = "#7f1d1d";
        }
        if (state.timeLeft <= 0) {
          submitQuiz();
        }
      }

      let tick = null;
      function startTimer() {
        if (tick) clearInterval(tick);
        const waktuTarget = Date.now() + state.timeLeft * 1000;
        tick = setInterval(() => {
          const waktuSekarang = Date.now();

          state.timeLeft = Math.ceil((waktuTarget - waktuSekarang) / 1000);

          if (state.timeLeft > 0) {
            renderTimer();
          } else {
            state.timeLeft = 0;
            renderTimer();
            clearInterval(tick);
          }
        }, 200);
      }

      function mountNav() {
        const nav = el("#nav");
        nav.innerHTML = "";
        QUESTIONS.forEach((q, idx) => {
          const b = document.createElement("button");
          b.textContent = idx + 1;
          b.addEventListener("click", () => {
            goTo(idx);
          });
          nav.appendChild(b);
        });
        updateNavActive();
      }

      function updateNavActive() {
        const buttons = els("#nav button");
        buttons.forEach((b, idx) => {
          b.classList.toggle("active", idx === state.currentIndex);
          b.classList.toggle("done", state.answers[idx] !== null);
        });
        el("#infoSoal").textContent = `Soal ${state.currentIndex + 1} / ${
          QUESTIONS.length
        }`;
        el("#infoKategori").textContent = `Kategori: ${QUESTIONS[
          state.currentIndex
        ].type.toUpperCase()}`;
      }

      function renderQuestion() {
        const q = QUESTIONS[state.currentIndex];
        const container = el("#questionArea");
        container.innerHTML = "";
        const title = document.createElement("div");
        title.className = "q-title";

        title.innerHTML = q.q;
        container.appendChild(title);

        const list = document.createElement("div");
        list.className = "choices";
        q.options.forEach((opt, i) => {
          const row = document.createElement("label");
          row.className = "choice";
          const input = document.createElement("input");
          input.type = "radio";
          input.name = "choice";
          input.value = i;
          input.checked = state.answers[state.currentIndex] === i;
          input.addEventListener("change", () => {
            state.answers[state.currentIndex] = i;
            updateNavActive();
          });
          const span = document.createElement("div");
          span.innerHTML = opt;
          row.appendChild(input);
          row.appendChild(span);
          list.appendChild(row);
        });
        container.appendChild(list);
        MathJax.typeset();
      }

      function goTo(idx) {
        state.currentIndex = Math.max(0, Math.min(QUESTIONS.length - 1, idx));
        updateNavActive();
        renderQuestion();
      }

      function next() {
        if (state.currentIndex < QUESTIONS.length - 1) {
          goTo(state.currentIndex + 1);
        }
      }
      function prev() {
        if (state.currentIndex > 0) {
          goTo(state.currentIndex - 1);
        }
      }

      function resetAnswers() {
        if (!confirm("Yakin reset semua jawaban?")) return;
        state.answers = Array(QUESTIONS.length).fill(null);
        updateNavActive();
        renderQuestion();
      }

      function submitQuiz() {
        // hitung skor per kategori
        let score = 0;
        QUESTIONS.forEach((q, idx) => {
          const pick = state.answers[idx];
          const correct = q.answer;
          if (pick === correct) {
            score++;
          }
        });
        const total = score;

        // tampilkan
        let total_question = QUESTIONS.length;

        el("#scoreTotal").textContent = `${total} / ${total_question}`;
        el("#resultUser").textContent = `Peserta: ${
          state.user?.nama || "-"
        } (waktu habis/kumpul)`;

        // stop timer, ganti section
        if (tick) clearInterval(tick);
        showSection("result");
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function showSection(which) {
        el("#section-form").classList.remove("active");
        el("#section-quiz").classList.remove("active");
        el("#section-result").classList.remove("active");
        if (which === "form") el("#section-form").classList.add("active");
        if (which === "quiz") el("#section-quiz").classList.add("active");
        if (which === "result") el("#section-result").classList.add("active");
      }

      // EVENTS
      el("#btnMulai").addEventListener("click", () => {
        const nama = el("#nama").value.trim();
        const pass = el("#pass").value.trim();
        if (!nama || !pass) {
          alert("Nama dan password wajib diisi.");
          return;
        }
        if (pass !== "BM21G") {
          alert(
            "password salah! tanya password ke sir hardi. klo sir hardi dak tau tanya ke sir meca",
          );
          return;
        }
        state.user = { nama, pass };
        el("#infoUser").textContent = `Peserta: ${nama}`;
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });

      el("#prevBtn").addEventListener("click", prev);
      el("#nextBtn").addEventListener("click", next);
      el("#btnReset").addEventListener("click", resetAnswers);
      el("#btnSubmit").addEventListener("click", () => {
        if (confirm("BENIAN BAE KAU NIH CEK LAGI JAWABAN KAU TUH!"))
          submitQuiz();
      });

      // Keyboard nav: panah kiri/kanan, angka 1-4 untuk memilih A-D
      window.addEventListener("keydown", (e) => {
        if (!el("#section-quiz").classList.contains("active")) return;
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
        if (["1", "2", "3", "4"].includes(e.key)) {
          const idx = parseInt(e.key) - 1;
          state.answers[state.currentIndex] = idx;
          updateNavActive();
          renderQuestion();
        }
      });

      // Ulang dari hasil
      el("#btnUlang").addEventListener("click", () => {
        state = {
          user: state.user,
          timeLeft: 5 * 60,
          currentIndex: 0,
          answers: Array(180).fill(null),
        };
        QUESTIONS = shuffle(QUESTIONS); // acak ulang urutan
        showSection("quiz");
        startTimer();
        mountNav();
        goTo(0);
        renderTimer();
      });
    </script>
  </body>
</html>
